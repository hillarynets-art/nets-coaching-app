 // ── STRENGTH (WorkoutLabs) ──────────────────────────
 {id:32,name:"GOBLET SQUAT",type:"strength",muscle:"lower",
  muscles:["Quadriceps","Glutes","Core","Hip Flexors"],primary:"Quadriceps",diff:"Beginner",
  equipment:"Dumbbell or Kettlebell",
  benefit:"Teaches perfect squat depth and upright posture — essential movement pattern for basketball stance and rebounding position.",
  steps:[
    {title:"Hold Weight at Chest",fig:"stand",desc:"Hold a dumbbell or kettlebell vertically at your chest, cupping the top end with both hands. Elbows point down. Feet shoulder-width apart, toes slightly out."},
    {title:"Squat Deep",fig:"squat_q",desc:"Push your hips back and down, keeping your chest tall and elbows inside your knees. Descend until your hip crease is below your knee — the weight naturally counterbalances you upright."},
    {title:"Drive Up",fig:"stand",desc:"Push through your full foot to stand. Squeeze glutes at the top. The weight stays glued to your chest the entire rep — no swinging."},
  ],
  cues:["Chest tall — elbows track inside knees","Hip crease below knee for full depth","Drive through full foot — not just heels","Core braced throughout"],
  tip:"The goblet squat is the single best exercise for learning to squat properly. The front-loaded weight forces you upright. If you can't squat deep, elevate your heels on small plates. Master this before progressing to barbell squats.",rpe:5},

 {id:33,name:"HIP THRUST",type:"strength",muscle:"lower",
  muscles:["Glutes","Hamstrings","Core","Hip Flexors"],primary:"Glutes",diff:"Intermediate",
  equipment:"Bench + Barbell or Dumbbell",
  benefit:"Maximum glute activation for explosive jumping, sprinting off the dribble, and absorbing contact in the lane.",
  steps:[
    {title:"Set Up on Bench",fig:"stand",desc:"Sit on the floor with your upper back against a bench edge. Roll a barbell over your hips (use a pad). Feet flat on the floor, hip-width apart, shins vertical."},
    {title:"Drive Hips Up",fig:"bridge",desc:"Push through your heels to lift your hips until your body forms a straight line from shoulders to knees. Squeeze your glutes HARD at the top. Hold 1 second."},
    {title:"Lower with Control",fig:"stand",desc:"Lower your hips back down under control — 2 seconds down. Don't let your lower back hyperextend at the top. Chin tucked slightly to maintain neutral spine."},
  ],
  cues:["Shins vertical at the top — feet not too far forward","Squeeze glutes HARD at top — 1 second hold","Chin tucked — don't arch your neck back","2 seconds down — control every rep"],
  tip:"Hip thrusts activate glutes far more than squats alone. For basketball players, strong glutes mean higher jumps and faster first steps. Start with bodyweight, then add a dumbbell across your hips before progressing to barbell.",rpe:7},

 {id:34,name:"LATERAL LUNGE",type:"strength",muscle:"lower",
  muscles:["Quadriceps","Glutes","Adductors","Hip Abductors","Core"],primary:"Adductors",diff:"Intermediate",
  equipment:"Bodyweight or Dumbbells",
  benefit:"Strengthens the lateral movement pattern — directly transfers to defensive slides, cutting, and change-of-direction on the court.",
  steps:[
    {title:"Wide Stance Start",fig:"stand",desc:"Stand tall with feet together. Take a large step directly to your RIGHT side. Plant your foot flat, toes pointing forward — not outward."},
    {title:"Sit Into the Lunge",fig:"lunge",desc:"Push your hips back and bend your RIGHT knee, keeping your LEFT leg straight. Your weight shifts over the bent leg. Chest stays tall. Go as low as your mobility allows."},
    {title:"Push Back to Start",fig:"stand",desc:"Drive through your RIGHT foot to push back to the starting position. Complete all reps on one side, then switch. For added load, hold dumbbells at your sides."},
  ],
  cues:["Step foot stays flat — toes forward","Straight leg stays fully extended","Hips push BACK, not just down","Chest tall — don't round forward"],
  tip:"Lateral lunges strengthen the adductors (inner thigh) which are often weak in basketball players and a common source of groin strains. Start with bodyweight and work toward full depth before adding weight.",rpe:6},

 {id:35,name:"STEP-UP",type:"strength",muscle:"lower",
  muscles:["Quadriceps","Glutes","Hamstrings","Calves","Core"],primary:"Quadriceps",diff:"Beginner",
  equipment:"Box or Bench + Optional Dumbbells",
  benefit:"Single-leg strength for layup drives, rebounding off one foot, and reducing knee injury risk through unilateral training.",
  steps:[
    {title:"Foot on Box",fig:"lunge_stand",desc:"Place your entire RIGHT foot flat on a box or bench (knee height or slightly below). Stand close enough that your shin is nearly vertical."},
    {title:"Drive Up",fig:"stand",desc:"Push through your RIGHT heel to stand up on the box. Bring your LEFT knee up to hip height at the top — don't just tap and go. Stand tall, fully extended."},
    {title:"Lower with Control",fig:"lunge_stand",desc:"Lower your LEFT foot back to the floor slowly — 3 seconds down. Your RIGHT foot stays on the box. Do NOT push off your bottom foot — make the top leg do ALL the work."},
  ],
  cues:["Full foot on box — heel doesn't hang off","Drive through heel — not toes","Don't push off the floor foot","3 seconds down — control the descent"],
  tip:"Step-ups are one of the most underrated exercises for basketball. They build exactly the single-leg push-off strength you need for layups and rebounding. Use a lower box and perfect form before going heavy.",rpe:5},

 {id:36,name:"WALL SIT",type:"strength",muscle:"lower",
  muscles:["Quadriceps","Glutes","Calves","Core"],primary:"Quadriceps",diff:"Beginner",
  equipment:"Wall",
  benefit:"Isometric quad endurance for maintaining low defensive stance through entire possessions without fatiguing.",
  steps:[
    {title:"Back Against Wall",fig:"squat_q",desc:"Lean your back flat against a wall. Walk your feet out until your thighs are PARALLEL to the floor and your shins are vertical. Feet hip-width apart."},
    {title:"Hold Position",fig:"squat_q",desc:"Hold this position. Your knees should be at exactly 90 degrees. Press your lower back into the wall. Arms can hang at your sides or cross your chest. Breathe steadily."},
    {title:"Stand to Finish",fig:"stand",desc:"When the timer ends, push through your feet to stand. Shake out your legs. Rest 60–90 seconds between sets. Aim to build up to 60-second holds."},
  ],
  cues:["Thighs parallel to floor — full 90°","Lower back pressed into wall","Breathe steadily — don't hold your breath","Shins vertical — knees over ankles"],
  tip:"Wall sits build the isometric endurance that lets you stay in a low defensive stance for entire possessions. Start with 20-second holds and build toward 60 seconds. For a basketball-specific challenge, hold a basketball in triple threat position while sitting.",rpe:6},

 {id:37,name:"FARMER'S WALK",type:"strength",muscle:"full",
  muscles:["Core","Traps","Forearms","Glutes","Calves","Shoulders"],primary:"Core",diff:"Beginner",
  equipment:"Heavy Dumbbells or Kettlebells",
  benefit:"Total body stability and grip strength for holding position in the post, controlling rebounds, and maintaining balance through contact.",
  steps:[
    {title:"Pick Up Weights",fig:"stand",desc:"Stand between two heavy dumbbells or kettlebells. Deadlift them up with a flat back. Stand tall — shoulders back, chest up, core braced hard."},
    {title:"Walk with Control",fig:"stand",desc:"Walk forward with short, controlled steps. Keep your core braced and shoulders level — don't lean side to side. Eyes forward, chin level. Walk 20–40 meters."},
    {title:"Set Down Safely",fig:"stand",desc:"At the end of the distance, hinge at the hips to place the weights down with control. Don't drop them. Rest 60–90 seconds and repeat."},
  ],
  cues:["Shoulders back and level — no leaning","Short controlled steps — don't rush","Core braced like someone's about to push you","Grip hard — squeeze the handles"],
  tip:"Farmer's walks build the grip, core, and postural strength that translates directly to holding position in the paint and controlling rebounds through traffic. Go heavy — you should struggle to finish the last 10 meters of each walk.",rpe:7},

 // ── POWER & PLYOMETRICS (WorkoutLabs) ───────────────
 {id:38,name:"TUCK JUMP",type:"power",muscle:"lower",
  muscles:["Quadriceps","Glutes","Hip Flexors","Calves","Core"],primary:"Quadriceps",diff:"Intermediate",
  equipment:"None",
  benefit:"Develops vertical explosiveness and fast hip flexion — trains the exact movement pattern of jumping for rebounds and blocks.",
  steps:[
    {title:"Athletic Stance",fig:"stand",desc:"Stand with feet shoulder-width apart, knees slightly bent, arms at your sides. Weight on balls of feet."},
    {title:"Jump & Tuck",fig:"jump",desc:"Explode straight up. At the peak of your jump, drive BOTH knees to your chest as high as possible. Hands can tap your knees at the top. Keep your torso upright — don't lean forward to meet your knees."},
    {title:"Land Softly",fig:"squat_q",desc:"Land softly on the balls of your feet, immediately bending your knees to absorb impact. Reset fully between reps — don't rush. Quality over speed."},
  ],
  cues:["Drive knees UP — don't lean torso DOWN","Land softly — toe-ball-heel","Reset fully between each rep","Keep torso upright throughout"],
  tip:"⚠️ High-impact exercise. Only do tuck jumps after a thorough warm-up. Start with 3 sets of 5 reps and build slowly. If your knees hurt on landing, your landing mechanics need work — practice soft landings from lower jumps first.",rpe:8},

 {id:39,name:"DEPTH JUMP",type:"power",muscle:"lower",
  muscles:["Quadriceps","Glutes","Calves","Hamstrings","Core"],primary:"Quadriceps",diff:"Advanced",
  equipment:"Box (30–60cm)",
  benefit:"Trains the stretch-shortening cycle for maximum reactive power — the highest-level plyometric for improving vertical jump.",
  steps:[
    {title:"Stand on Box Edge",fig:"stand",desc:"Stand on the edge of a box (start at 30cm height). Feet hip-width apart, toes near the edge. Arms at your sides."},
    {title:"Step Off (Don't Jump)",fig:"jump",desc:"STEP off the box — do NOT jump off. Both feet should land simultaneously on the ground. The moment your feet touch, immediately EXPLODE upward as high as possible. Minimize ground contact time."},
    {title:"Land & Absorb",fig:"squat_q",desc:"Land your second jump softly with bent knees. The key metric is ground contact time — you want to spend as LITTLE time on the ground as possible between the drop and the jump."},
  ],
  cues:["STEP off — never jump off the box","Minimize ground contact time","React instantly on landing — don't pause","Land the final jump softly with bent knees"],
  tip:"⚠️ Advanced exercise — only attempt after 3+ months of basic plyometric training. Depth jumps place extreme forces on tendons and joints. Start with a LOW box (30cm). If you can't jump HIGHER than your normal standing jump, the box is too high. Never do more than 4 sets of 3–5 reps.",rpe:9},

 {id:40,name:"SKATER JUMP",type:"power",muscle:"lower",
  muscles:["Glutes","Quadriceps","Hip Abductors","Calves","Core"],primary:"Glutes",diff:"Intermediate",
  equipment:"None",
  benefit:"Lateral explosive power for crossovers, euro steps, and fast change-of-direction moves on the court.",
  steps:[
    {title:"Single-Leg Start",fig:"stand",desc:"Stand on your RIGHT leg, left foot off the ground. Bend your right knee slightly and hinge forward at the hips. Arms ready to swing."},
    {title:"Bound Laterally",fig:"jump",desc:"Explode laterally to your LEFT, swinging your arms for momentum. Land on your LEFT foot only. Your right leg sweeps behind your left — like a speed skater. Stick the landing for 1 second."},
    {title:"Bound Back",fig:"jump",desc:"From your left leg, immediately bound back to the RIGHT and land on your right foot. Each jump should cover maximum lateral distance. Alternate continuously."},
  ],
  cues:["Land on ONE foot — stick it for 1 second","Maximum lateral distance each jump","Swing arms for power and balance","Soft single-leg landing — knee slightly bent"],
  tip:"Skater jumps build the lateral power that makes crossovers and euro steps explosive. Start with shorter distances and build up. If you can't stick the single-leg landing, the distance is too far — shorten it and build stability first.",rpe:7},

 {id:41,name:"SINGLE-LEG HOP",type:"power",muscle:"lower",
  muscles:["Quadriceps","Glutes","Calves","Core","Hip Stabilizers"],primary:"Calves",diff:"Intermediate",
  equipment:"None",
  benefit:"Unilateral power and landing stability — essential for layup finishing, shot-blocking off one foot, and injury-resilient ankles.",
  steps:[
    {title:"Single-Leg Stance",fig:"stand",desc:"Stand on your RIGHT leg. Left foot off the ground, knee slightly bent. Arms at your sides ready to drive upward."},
    {title:"Hop Forward",fig:"jump",desc:"Hop forward on your RIGHT leg — drive your arms up to generate power. Land on the SAME foot. Immediately hop again. Perform 5 consecutive hops forward."},
    {title:"Stick Final Landing",fig:"squat_q",desc:"On the final hop, stick the landing and hold for 3 seconds. Your knee should be stable — no wobbling inward. Switch legs and repeat."},
  ],
  cues:["Land on the ball of your foot each hop","Knee tracks over toes — no inward collapse","Stick the final landing for 3 seconds","Drive arms up for each hop"],
  tip:"Single-leg hops expose imbalances between your legs. If one side is noticeably weaker or less stable, do extra reps on that side. Strong single-leg landing mechanics are the number one way to prevent ACL and ankle injuries in basketball.",rpe:7},

 {id:42,name:"BURPEE",type:"power",muscle:"full",
  muscles:["Quadriceps","Chest","Shoulders","Core","Triceps","Hip Flexors"],primary:"Quadriceps",diff:"Intermediate",
  equipment:"None",
  benefit:"Full-body conditioning that simulates the up-and-down demands of basketball — diving for loose balls, getting up, and sprinting back.",
  steps:[
    {title:"Drop to Floor",fig:"pushup_down",desc:"From standing, squat down and place your hands on the floor. Jump your feet back to a push-up position. Your body should form a straight line."},
    {title:"Push-Up",fig:"pushup_up",desc:"Perform one full push-up — chest touches the floor, then push back up. Keep your core tight and body straight."},
    {title:"Jump Up",fig:"jump",desc:"Jump your feet forward to your hands. Explode upward into a jump, reaching your arms overhead. Land softly and immediately begin the next rep."},
  ],
  cues:["Chest touches floor on the push-up","Hips don't sag in plank position","Explode up from the squat","Land softly — continuous movement"],
  tip:"Burpees are brutal but they build the exact conditioning basketball demands — repeated floor-to-standing-to-jumping transitions. Start with 5-rep sets and build. For a basketball-specific version, add a defensive slide between each burpee.",rpe:8},

 // ── RECOVERY STRETCHES (WorkoutLabs) ────────────────
 {id:43,name:"PIGEON STRETCH",type:"stretching",muscle:"lower",
  muscles:["Glutes","Piriformis","Hip Flexors","Hip External Rotators"],primary:"Glutes",diff:"Beginner",
  equipment:"None (Mat optional)",
  benefit:"Opens tight hips from hours of running and cutting — the single best stretch for basketball players' chronically tight glutes and hip rotators.",
  steps:[
    {title:"Front Leg Position",fig:"lunge",desc:"From a kneeling position, bring your RIGHT knee forward and lay your right shin across your body at an angle. Your right foot should be near your left hip. The more parallel your shin is to your shoulders, the deeper the stretch."},
    {title:"Extend Back Leg",fig:"lunge",desc:"Slide your LEFT leg straight back behind you, top of the foot on the floor. Square your hips toward the front. You should feel a deep stretch in your right glute and hip."},
    {title:"Deepen the Stretch",fig:"lunge",desc:"Walk your hands forward and lower your torso toward the floor. Hold for 30–60 seconds. Breathe deeply into the stretch. Switch sides."},
  ],
  cues:["Square hips toward the front","Breathe deeply — don't hold your breath","Hold 30–60 seconds per side","Go deeper gradually — never force it"],
  tip:"If this stretch is intense, your hips are tight — which means you need it even more. Use a pillow under your hip for support if needed. Do this stretch after every game and practice. It prevents the glute tightness that leads to lower back pain.",rpe:3},

 {id:44,name:"FIGURE-4 STRETCH",type:"stretching",muscle:"lower",
  muscles:["Glutes","Piriformis","Hip External Rotators"],primary:"Piriformis",diff:"Beginner",
  equipment:"None (Mat optional)",
  benefit:"Targets the piriformis muscle deep in the glute — relieves sciatic-type tightness from repetitive running and jumping.",
  steps:[
    {title:"Lie on Back",fig:"bridge",desc:"Lie on your back with both knees bent, feet flat on the floor. Cross your RIGHT ankle over your LEFT knee, creating a figure-4 shape."},
    {title:"Pull Knee Toward Chest",fig:"bridge",desc:"Reach both hands behind your LEFT thigh and gently pull your left knee toward your chest. Your right ankle stays crossed over. You'll feel a deep stretch in your right glute."},
    {title:"Hold & Breathe",fig:"bridge",desc:"Hold for 30–45 seconds. Keep your head on the floor and relax your shoulders. Push your right knee gently away from you with your right elbow to deepen the stretch. Switch sides."},
  ],
  cues:["Keep head and shoulders on the floor","Push knee gently outward to deepen","Hold 30–45 seconds per side","Breathe deeply — relax into it"],
  tip:"The figure-4 stretch is gentler than the pigeon stretch and perfect for post-game recovery when your muscles are fatigued. If you feel numbness or tingling (not just stretch), ease off — you may be compressing the sciatic nerve.",rpe:2},

 {id:45,name:"BUTTERFLY STRETCH",type:"stretching",muscle:"lower",
  muscles:["Adductors","Groin","Hip Flexors"],primary:"Adductors",diff:"Beginner",
  equipment:"None (Mat optional)",
  benefit:"Opens the inner thighs and groin — critical recovery for the lateral movements and defensive slides that tighten these muscles.",
  steps:[
    {title:"Seated Soles Together",fig:"stand",desc:"Sit on the floor. Bring the soles of your feet together and pull your heels as close to your body as comfortable. Let your knees fall out to the sides."},
    {title:"Press Knees Down",fig:"stand",desc:"Sit tall with a straight back. Gently press your knees toward the floor using your elbows. Don't force them — gravity and gentle pressure will increase range over time."},
    {title:"Lean Forward",fig:"stand",desc:"Keeping your back straight, hinge forward from your hips. Walk your hands forward on the floor. Hold for 30–60 seconds. You should feel the stretch along your inner thighs."},
  ],
  cues:["Back straight — don't round your spine","Gentle pressure on knees — never force","Lean from hips, not upper back","Hold 30–60 seconds"],
  tip:"Groin strains are extremely common in basketball from defensive slides and quick lateral cuts. This stretch done consistently after games dramatically reduces that risk. If one side is tighter, spend extra time on it.",rpe:2},

 {id:46,name:"CAT-COW STRETCH",type:"stretching",muscle:"core",
  muscles:["Spine","Core","Lower Back","Upper Back"],primary:"Spine",diff:"Beginner",
  equipment:"None (Mat optional)",
  benefit:"Mobilizes the entire spine — relieves stiffness from the constant impact of running and jumping on the court.",
  steps:[
    {title:"All Fours Position",fig:"pushup_up",desc:"Start on hands and knees. Hands directly under shoulders, knees under hips. Back flat in a neutral position."},
    {title:"Cat: Round Up",fig:"pushup_down",desc:"Exhale and round your spine toward the ceiling. Tuck your chin to your chest and tuck your pelvis under. Push the floor away. Hold 2–3 seconds."},
    {title:"Cow: Arch Down",fig:"pushup_up",desc:"Inhale and arch your back, dropping your belly toward the floor. Lift your chest and chin. Let your shoulder blades squeeze together. Hold 2–3 seconds. Alternate slowly for 10 reps."},
  ],
  cues:["Move slowly — 2–3 seconds each position","Breathe: exhale on Cat, inhale on Cow","Move through your ENTIRE spine","10 slow reps minimum"],
  tip:"Cat-cow is the best spinal warm-up and cooldown in existence. Do it before every session to prepare your back and after every game to decompress your spine. It takes 60 seconds and prevents a lifetime of back problems.",rpe:1},

 {id:47,name:"CHILD'S POSE",type:"stretching",muscle:"full",
  muscles:["Lower Back","Lats","Shoulders","Hips","Ankles"],primary:"Lower Back",diff:"Beginner",
  equipment:"None (Mat optional)",
  benefit:"Full-body decompression stretch that calms the nervous system — perfect for post-game cooldown and recovery.",
  steps:[
    {title:"Kneel & Sit Back",fig:"lunge",desc:"Kneel on the floor with your big toes touching and knees spread wide apart (wider than hip-width). Sit your hips back onto your heels."},
    {title:"Reach Forward",fig:"lunge",desc:"Walk your hands forward on the floor as far as you can. Lower your chest toward the floor between your knees. Forehead rests on the floor. Arms extended long."},
    {title:"Breathe & Hold",fig:"lunge",desc:"Relax everything. Let gravity pull you deeper. Breathe slowly and deeply for 45–90 seconds. With each exhale, let your body sink a little further into the stretch."},
  ],
  cues:["Knees wide — chest melts between them","Hips push back toward heels","Breathe deeply — relax completely","Hold 45–90 seconds minimum"],
  tip:"Child's pose is the most underrated recovery position. It simultaneously stretches your back, hips, ankles, and shoulders while activating your parasympathetic nervous system (rest & recover mode). Use it between sets of intense exercises and as the final stretch of every session.",rpe:1},

 {id:48,name:"LYING SPINAL TWIST",type:"stretching",muscle:"core",
  muscles:["Lower Back","Obliques","Glutes","Chest","Spine"],primary:"Lower Back",diff:"Beginner",
  equipment:"None (Mat optional)",
  benefit:"Decompresses the spine and releases tension in the lower back and hips — relieves the tightness that builds from constant running.",
  steps:[
    {title:"Lie on Back",fig:"bridge",desc:"Lie flat on your back with arms extended out to your sides in a T-shape, palms down. Both knees bent, feet flat on the floor."},
    {title:"Drop Knees to One Side",fig:"bridge",desc:"Let both knees fall to your RIGHT side toward the floor. Keep both shoulders pinned to the ground. Turn your head to look LEFT (opposite direction of your knees)."},
    {title:"Hold & Switch",fig:"bridge",desc:"Hold for 30–45 seconds. Breathe deeply and let gravity pull your knees closer to the floor each exhale. Bring knees back to center and repeat on the other side."},
  ],
  cues:["Both shoulders stay on the floor","Knees fall together — don't separate","Look opposite direction of knees","30–45 seconds per side"],
  tip:"This twist creates a gentle traction effect on your spine that relieves compression from all the jumping and landing in basketball. Do it at the end of every session. If you hear gentle pops, that's normal — it's your spine decompressing.",rpe:1},

 {id:49,name:"CHEST DOORWAY STRETCH",type:"stretching",muscle:"upper",
  muscles:["Chest","Anterior Deltoids","Biceps"],primary:"Chest",diff:"Beginner",
  equipment:"Doorway or Post",
  benefit:"Opens the chest and shoulders that get tight from defensive postures and ball handling — prevents the rounded-shoulder posture common in athletes.",
  steps:[
    {title:"Arm on Doorframe",fig:"stand",desc:"Stand in a doorway. Place your RIGHT forearm on the doorframe with your elbow at shoulder height. Your upper arm should be parallel to the floor."},
    {title:"Step Through",fig:"lunge",desc:"Step your RIGHT foot forward through the doorway. Lean your body gently forward until you feel a stretch across your right chest and front shoulder."},
    {title:"Hold & Adjust Height",fig:"lunge",desc:"Hold 30 seconds. Then raise your elbow ABOVE shoulder height and repeat — this targets the upper chest. Then lower it BELOW shoulder height for lower chest. 30 seconds each position. Switch arms."},
  ],
  cues:["Elbow at three heights: shoulder, above, below","Step through gently — don't force","Keep core engaged — don't arch your back","30 seconds at each height per side"],
  tip:"Basketball players develop tight chests from the defensive stance and constant ball-handling posture. This stretch at three different angles hits all fibers of the chest. Do it daily — it takes 3 minutes total and prevents shoulder problems.",rpe:2},

 {id:50,name:"STANDING CALF STRETCH",type:"stretching",muscle:"lower",
  muscles:["Gastrocnemius","Soleus","Achilles"],primary:"Gastrocnemius",diff:"Beginner",
  equipment:"Wall or Step",
  benefit:"Essential recovery for the calves and Achilles tendon — the most stressed structures in basketball from constant sprinting and jumping.",
  steps:[
    {title:"Wall Lean Setup",fig:"lunge_stand",desc:"Face a wall. Place both hands on the wall at shoulder height. Step your RIGHT foot back about 2–3 feet. Keep your right heel flat on the floor and right leg straight."},
    {title:"Lean Into Wall",fig:"lunge",desc:"Bend your LEFT knee and lean your hips toward the wall. Keep your RIGHT heel DOWN and RIGHT knee STRAIGHT. You should feel the stretch in your right calf. Hold 30 seconds."},
    {title:"Bent-Knee Variation",fig:"lunge",desc:"Now slightly BEND your right knee while keeping the heel down. This shifts the stretch to the deeper SOLEUS muscle and Achilles tendon. Hold 30 seconds. Switch legs."},
  ],
  cues:["Back heel stays flat on the floor","Straight leg = gastrocnemius stretch","Bent knee = soleus/Achilles stretch","30 seconds each position per leg"],
  tip:"⚠️ The Achilles tendon is the most commonly ruptured tendon in basketball. Consistent calf stretching (both straight and bent knee) is your best protection. Do this after EVERY session — never skip it. If you feel a sharp pain (not stretch) in your Achilles, see a physiotherapist immediately.",rpe:2},

 // ── CORE & CONDITIONING (WorkoutLabs) ───────────────
 {id:51,name:"RUSSIAN TWIST",type:"strength",muscle:"core",
  muscles:["Obliques","Rectus Abdominis","Hip Flexors","Lower Back"],primary:"Obliques",diff:"Intermediate",
  equipment:"Medicine Ball or Dumbbell (optional)",
  benefit:"Rotational core power for passing accuracy, shooting through contact, and absorbing hits in the lane while maintaining balance.",
  steps:[
    {title:"V-Sit Position",fig:"stand",desc:"Sit on the floor with knees bent, feet slightly off the ground (or heels lightly touching for beginners). Lean back to about 45 degrees. Clasp your hands together or hold a weight at your chest."},
    {title:"Rotate Side to Side",fig:"stand",desc:"Rotate your torso to the RIGHT, bringing your hands (or weight) toward the floor beside your hip. Then rotate ALL the way to the LEFT. That's one rep. Your legs should stay still — only your torso rotates."},
    {title:"Maintain Tempo",fig:"stand",desc:"Control the rotation — 1 second each side. Don't rush. Keep your back straight (not rounded) and chest lifted. Start with 10 reps per side and build to 20."},
  ],
  cues:["Feet off floor for full engagement","Rotate from your TORSO — not just arms","Back straight — don't round","1 second per side — controlled"],
  tip:"Russian twists build the rotational core strength that powers chest passes and helps you finish through contact. Start with bodyweight, then add a basketball or medicine ball. Keep your feet off the ground to engage your hip flexors too.",rpe:6},

 {id:52,name:"DEAD BUG",type:"strength",muscle:"core",
  muscles:["Core","Rectus Abdominis","Transverse Abdominis","Hip Flexors"],primary:"Transverse Abdominis",diff:"Beginner",
  equipment:"None (Mat optional)",
  benefit:"Trains anti-extension core stability — the foundation for maintaining posture through contact, screens, and explosive movements.",
  steps:[
    {title:"Starting Position",fig:"bridge",desc:"Lie on your back. Raise both arms straight up toward the ceiling. Lift both legs with knees bent at 90 degrees (tabletop position). Press your lower back firmly into the floor — NO arch."},
    {title:"Extend Opposite Limbs",fig:"bridge",desc:"Slowly extend your RIGHT arm overhead toward the floor while simultaneously extending your LEFT leg straight out (hovering above the floor). Your lower back MUST stay pressed into the floor."},
    {title:"Return & Alternate",fig:"bridge",desc:"Bring both limbs back to the starting position. Repeat with LEFT arm and RIGHT leg. Move SLOWLY — 3 seconds out, 3 seconds back. If your lower back arches off the floor, you've gone too far."},
  ],
  cues:["Lower back PRESSED into floor — always","Move slowly — 3 seconds each direction","Opposite arm and leg extend together","If back arches, reduce range of motion"],
  tip:"Dead bugs look easy but are incredibly effective for building the deep core stability that protects your spine during explosive basketball movements. The key: if your lower back comes off the floor at ANY point, your core has lost control. Reduce the range and build up.",rpe:4},

 {id:53,name:"BIRD DOG",type:"strength",muscle:"core",
  muscles:["Core","Lower Back","Glutes","Shoulders","Hip Stabilizers"],primary:"Core",diff:"Beginner",
  equipment:"None (Mat optional)",
  benefit:"Anti-rotation core stability that transfers directly to maintaining balance through contact, screens, and mid-air collisions.",
  steps:[
    {title:"All Fours Position",fig:"pushup_up",desc:"Start on hands and knees. Hands directly under shoulders, knees under hips. Back flat — imagine balancing a cup of water on your lower back."},
    {title:"Extend Opposite Limbs",fig:"pushup_up",desc:"Slowly extend your RIGHT arm forward and LEFT leg backward until both are parallel to the floor. Hold for 2 seconds. Your hips should NOT rotate — keep them perfectly level."},
    {title:"Return & Alternate",fig:"pushup_up",desc:"Bring both limbs back slowly. Repeat with LEFT arm and RIGHT leg. Focus on zero hip rotation — that's the challenge. 8–10 reps per side."},
  ],
  cues:["Hips stay perfectly level — no rotation","Extend until arm and leg are parallel to floor","Hold 2 seconds at full extension","Move slowly — quality over speed"],
  tip:"Bird dogs train anti-rotation — the core's ability to prevent unwanted movement. In basketball, this means maintaining control when someone bumps you mid-air or sets a screen. If your hips rotate, you're going too fast.",rpe:3},

 {id:54,name:"SIDE PLANK",type:"strength",muscle:"core",
  muscles:["Obliques","Transverse Abdominis","Glutes","Shoulders","Hip Abductors"],primary:"Obliques",diff:"Intermediate",
  equipment:"None (Mat optional)",
  benefit:"Lateral core stability for defending against post players, absorbing side contact, and maintaining balance on one-legged finishes.",
  steps:[
    {title:"Side-Lying Setup",fig:"plank",desc:"Lie on your RIGHT side. Stack your feet. Place your right forearm on the floor with elbow directly under your shoulder. Left arm on your left hip."},
    {title:"Lift Hips",fig:"plank",desc:"Lift your hips off the floor until your body forms a straight line from head to feet. Don't let your hips sag or pike up. Squeeze your glutes and brace your core."},
    {title:"Hold & Switch",fig:"plank",desc:"Hold for 20–45 seconds. Breathe steadily. Lower with control and switch sides. Build toward 45-second holds on each side."},
  ],
  cues:["Straight line from head to feet","Hips don't sag or pike","Elbow directly under shoulder","Breathe steadily — don't hold your breath"],
  tip:"Side planks build the lateral core strength that's often neglected. For basketball, strong obliques mean better balance when absorbing contact from the side and more stability on one-footed finishes at the rim. Add hip dips (lower and lift hips) for extra challenge.",rpe:5},

 {id:55,name:"MOUNTAIN CLIMBER",type:"power",muscle:"full",
  muscles:["Core","Hip Flexors","Shoulders","Quadriceps","Calves"],primary:"Core",diff:"Beginner",
  equipment:"None",
  benefit:"Cardiovascular conditioning with core engagement — simulates the constant motion and quick transitions demanded in basketball.",
  steps:[
    {title:"High Plank Start",fig:"pushup_up",desc:"Start in a push-up position. Hands directly under shoulders, body in a straight line. Core braced tight."},
    {title:"Drive Knees",fig:"pushup_down",desc:"Drive your RIGHT knee toward your chest rapidly, then switch — driving your LEFT knee forward as your right leg goes back. It's a running motion in plank position."},
    {title:"Maintain Form",fig:"pushup_up",desc:"Continue alternating at a fast pace for 20–40 seconds. Keep your hips level — don't let them bounce up and down. Hands stay planted, shoulders stay over wrists."},
  ],
  cues:["Hips stay level — no bouncing","Drive knees to chest — full range","Hands stay planted under shoulders","Fast pace but controlled form"],
  tip:"Mountain climbers are one of the most efficient conditioning exercises — they train cardio, core, and hip flexors simultaneously. For basketball specificity, do them in 20-second bursts with 10 seconds rest, simulating the stop-and-go nature of the game.",rpe:7},

 {id:56,name:"BEAR CRAWL",type:"power",muscle:"full",
  muscles:["Core","Shoulders","Quadriceps","Hip Flexors","Glutes"],primary:"Core",diff:"Intermediate",
  equipment:"None",
  benefit:"Total body coordination and core stability — builds the movement quality and body control needed for basketball's complex multi-directional demands.",
  steps:[
    {title:"Bear Position",fig:"pushup_up",desc:"Start on all fours. Lift your knees 1–2 inches off the floor. Hands under shoulders, knees under hips. Back flat. This is the bear position — hold it steady."},
    {title:"Crawl Forward",fig:"pushup_up",desc:"Move your RIGHT hand and LEFT foot forward simultaneously (opposite limbs). Then LEFT hand and RIGHT foot. Take small steps. Keep your hips LOW and level — no swaying."},
    {title:"Crawl Distance",fig:"pushup_up",desc:"Crawl forward 10–20 meters, then crawl BACKWARD the same distance. Keep your knees hovering just inches off the floor the entire time. Your back stays flat."},
  ],
  cues:["Knees hover 1–2 inches off floor","Opposite hand and foot move together","Hips stay low and level — no swaying","Small steps — quality over speed"],
  tip:"Bear crawls look simple but they're exhausting and incredibly effective for building the full-body coordination that basketball demands. Keep your knees close to the floor — if they rise above hip height, you're doing it wrong. Try bear crawl races with teammates for competition.",rpe:7},

 {id:57,name:"HIGH KNEES",type:"power",muscle:"lower",
  muscles:["Hip Flexors","Quadriceps","Calves","Core","Glutes"],primary:"Hip Flexors",diff:"Beginner",
  equipment:"None",
  benefit:"Foot speed and hip flexor power for fast breaks, quick defensive reactions, and rapid change of pace on the court.",
  steps:[
    {title:"Upright Stance",fig:"stand",desc:"Stand tall with feet hip-width apart. Arms bent at 90 degrees at your sides, like a sprinter."},
    {title:"Drive Knees Up",fig:"jump",desc:"Rapidly drive your RIGHT knee up to hip height while pumping your LEFT arm forward. Then switch — LEFT knee up, RIGHT arm forward. Stay on the balls of your feet."},
    {title:"Maintain Tempo",fig:"jump",desc:"Continue at maximum speed for 15–30 seconds. Each knee must reach HIP height — don't cheat the range. Stay tall — don't lean back. Pump your arms hard."},
  ],
  cues:["Every knee reaches hip height — no shortcuts","Stay tall — don't lean backward","Pump arms hard — they drive the speed","Balls of feet — light and fast"],
  tip:"High knees are the simplest way to improve foot speed for basketball. Do them as part of your warm-up (30 seconds at moderate pace) and as conditioning (15-second max-effort bursts). Focus on getting your knees to full height rather than going fast with shallow range.",rpe:6},

{id:58,name:"WALKING LUNGE",type:"strength",muscle:"lower",
 muscles:["Quadriceps","Glutes","Hamstrings","Hip Flexors","Core"],primary:"Quadriceps",diff:"Beginner",
 equipment:"Bodyweight (add dumbbells to progress)",
 benefit:"Trains single-leg strength through a full range of motion while moving forward — mirrors the driving and cutting patterns of basketball.",
 steps:[
   {title:"Tall Start",fig:"stand",desc:"Stand tall with feet hip-width apart, arms at your sides or hands on hips. Brace your core and look straight ahead."},
   {title:"Step & Lower",fig:"lunge",desc:"Take a large step forward with your RIGHT foot. Lower your body until both knees form 90-degree angles. Your back knee hovers just above the floor. Keep your torso upright — do NOT lean forward."},
   {title:"Drive Forward",fig:"lunge_stand",desc:"Push through your RIGHT heel and step your LEFT foot forward into the next lunge. Continue alternating legs as you walk forward. Each rep is one step."},
 ],
 cues:["Back knee hovers 1 inch off the floor","Front knee tracks over your toes — not past","Chest stays tall — don't fold forward","Drive through the heel, not the toes"],
 tip:"Walking lunges build the single-leg strength basketball demands on every drive and cut. Start bodyweight for 3×10 each leg, then add dumbbells (15-25 lb each hand). For basketball specificity, occasionally add a torso rotation toward the front leg at the bottom.",rpe:6},

{id:59,name:"SINGLE-LEG DEADLIFT",type:"strength",muscle:"lower",
 muscles:["Hamstrings","Glutes","Core","Lower Back","Calves"],primary:"Hamstrings",diff:"Intermediate",
 equipment:"Dumbbell or Kettlebell",
 benefit:"Builds single-leg balance and posterior chain strength — critical for injury prevention, landing mechanics, and deceleration on the court.",
 steps:[
   {title:"Stand on One Leg",fig:"stand",desc:"Hold a dumbbell in your LEFT hand. Stand on your RIGHT foot with a slight knee bend. Lift your LEFT foot slightly off the ground."},
   {title:"Hinge Forward",fig:"lunge_stand",desc:"Hinge at your hips, sending your LEFT leg straight back as your torso lowers toward the floor. The dumbbell travels straight down. Your body forms a T-shape — back leg, torso, and head in one line."},
   {title:"Return to Standing",fig:"stand",desc:"Squeeze your RIGHT glute and hamstring to pull yourself back to standing. Control the motion — don't rush. Complete all reps on one side, then switch."},
 ],
 cues:["Hips stay SQUARE to the floor — don't open up","Slight knee bend in the standing leg — never locked","Back leg, torso, and head form ONE straight line","Move slowly — balance is the challenge"],
 tip:"This is one of the best exercises for basketball injury prevention. Weak hamstrings and poor single-leg balance are the top risk factors for ACL injuries. Start with a light weight (10-15 lb) and focus on perfect balance before adding load. Do 3×8 each leg.",rpe:7},

{id:60,name:"KETTLEBELL SWING",type:"strength",muscle:"lower",
 muscles:["Glutes","Hamstrings","Core","Shoulders","Hip Flexors"],primary:"Glutes",diff:"Intermediate",
 equipment:"Kettlebell",
 benefit:"Develops explosive hip extension power — the same movement pattern that drives jumping, sprinting, and defensive slides in basketball.",
 steps:[
   {title:"Setup",fig:"squat_q",desc:"Stand with feet slightly wider than shoulder-width. Hold the kettlebell with both hands, arms straight. Hinge at the hips and let the bell hang between your knees. Back flat, core braced."},
   {title:"Hike & Drive",fig:"stand",desc:"Snap your hips forward explosively, squeezing your glutes hard. This hip thrust launches the kettlebell forward and up to chest height. Your arms are just along for the ride — the power comes from your hips."},
   {title:"Control the Backswing",fig:"squat_q",desc:"Let the kettlebell swing back between your legs as you hinge at the hips again. Maintain a flat back and braced core. Immediately snap your hips forward for the next rep. This is a continuous, rhythmic movement."},
 ],
 cues:["HIP SNAP — not an arm lift. The bell floats from hip power","Squeeze glutes at the top like you're finishing a jump","Flat back on the backswing — never round your spine","Bell goes to chest height — not overhead"],
 tip:"The kettlebell swing is the #1 exercise for developing the explosive hip extension that powers your vertical jump. Start with a moderate weight (25-35 lb) and do 3-4 sets of 12-15 reps. Once your form is solid, go heavier for power (4×8).",rpe:7},

{id:61,name:"SUMO SQUAT",type:"strength",muscle:"lower",
 muscles:["Adductors","Glutes","Quadriceps","Hamstrings","Core"],primary:"Adductors",diff:"Beginner",
 equipment:"Dumbbell or Kettlebell (optional)",
 benefit:"Strengthens the inner thighs and hips in a wide stance — directly transfers to defensive positioning, lateral movement, and rebounding base.",
 steps:[
   {title:"Wide Stance",fig:"stand",desc:"Stand with feet 1.5x shoulder-width apart, toes pointed out 45 degrees. Hold a weight at your hips with both hands, or use bodyweight only."},
   {title:"Squat Down",fig:"squat_q",desc:"Lower your hips straight down by bending your knees outward over your toes. Keep your torso upright and core braced. Descend until your thighs are parallel to the floor or slightly below."},
   {title:"Drive Up",fig:"stand",desc:"Push through both feet evenly to stand back up. Squeeze your glutes and inner thighs at the top. Keep your knees tracking over your toes throughout the movement."},
 ],
 cues:["Knees push OUT over toes — never collapse inward","Torso stays upright — don't lean forward","Push through full foot — not just toes","Feel the inner thighs working on every rep"],
 tip:"Basketball players need strong adductors for lateral defense and rebounding position. This squat variation targets them directly. Start bodyweight, progress to holding a dumbbell or kettlebell. Do 3×12-15.",rpe:6},

{id:62,name:"PIKE PUSH-UP",type:"strength",muscle:"upper",
 muscles:["Anterior Deltoids","Triceps","Upper Chest","Core","Trapezius"],primary:"Anterior Deltoids",diff:"Intermediate",
 equipment:"None",
 benefit:"Builds overhead pressing strength with bodyweight alone — develops the shoulder power needed for shooting range and defensive hand challenges.",
 steps:[
   {title:"Pike Position",fig:"pushup_up",desc:"Start in a push-up position, then walk your feet toward your hands until your hips are high in the air forming an inverted V. Your body should be at roughly 90 degrees at the hips. Hands shoulder-width apart."},
   {title:"Lower Your Head",fig:"pushup_down",desc:"Bend your elbows and lower the top of your head toward the floor between your hands. Elbows track back at about 45 degrees. Lower until your head nearly touches the floor."},
   {title:"Press Up",fig:"pushup_up",desc:"Push through your hands to extend your arms fully, returning to the pike position. Keep your core tight and hips high throughout the movement."},
 ],
 cues:["Hips stay HIGH — this is a shoulder press, not a push-up","Head goes between your hands, not in front","Elbows at 45 degrees — not flared wide","Elevate feet on a bench to increase difficulty"],
 tip:"Pike push-ups are the bodyweight alternative to overhead presses. They build the shoulder strength needed for shooting from distance and challenging shots defensively. Start with 3×8 and progress to feet-elevated pike push-ups.",rpe:7},

{id:63,name:"INVERTED ROW",type:"strength",muscle:"upper",
 muscles:["Lats","Rhomboids","Biceps","Rear Deltoids","Core"],primary:"Lats",diff:"Beginner",
 equipment:"Barbell in Rack or Sturdy Table",
 benefit:"Bodyweight pulling exercise that strengthens the back muscles needed for rebounding, boxing out, and absorbing contact on drives.",
 steps:[
   {title:"Hang Under Bar",fig:"plank",desc:"Set a barbell in a rack at waist height. Lie underneath and grip the bar slightly wider than shoulder-width, palms facing away. Extend your body so you hang with arms straight, heels on the ground."},
   {title:"Pull Chest to Bar",fig:"pushup_up",desc:"Squeeze your shoulder blades together and pull your chest up to the bar. Keep your body rigid as a plank — hips don't sag or pike. Elbows drive back, not out."},
   {title:"Lower with Control",fig:"plank",desc:"Slowly extend your arms to return to the start position. Maintain the rigid body line. Don't let your shoulders round forward at the bottom."},
 ],
 cues:["Body stays RIGID — straight line from head to heels","Squeeze shoulder blades together at the top","Elbows drive back along your ribs","Lower the bar height to increase difficulty"],
 tip:"This is an excellent pulling exercise that requires no machines. It builds the back strength needed for physical basketball — rebounding, posting up, and absorbing contact. Start with the bar at hip height (easier) and lower it as you get stronger. Do 3×10-12.",rpe:6},

{id:64,name:"PISTOL SQUAT",type:"strength",muscle:"lower",
 muscles:["Quadriceps","Glutes","Hamstrings","Hip Flexors","Core"],primary:"Quadriceps",diff:"Advanced",
 equipment:"None (use support for assistance)",
 benefit:"The ultimate single-leg strength test — develops the leg power and balance needed for finishing through contact and explosive first steps.",
 steps:[
   {title:"Balance on One Leg",fig:"stand",desc:"Stand on your RIGHT foot. Extend your LEFT leg straight out in front of you, off the ground. Arms extended forward for counterbalance."},
   {title:"Descend Slowly",fig:"squat_q",desc:"Bend your RIGHT knee and lower your body as deep as you can while keeping your LEFT leg extended and off the floor. Your RIGHT heel stays flat on the ground. Go as low as your mobility allows."},
   {title:"Drive Up",fig:"stand",desc:"Push through your RIGHT foot to stand back up to the starting position. Keep your extended leg off the floor throughout. Complete all reps, then switch legs."},
 ],
 cues:["Heel stays flat on the ground — never lift it","Extended leg stays straight and off the floor","Arms forward for counterbalance","Use a doorframe or chair for support while learning"],
 tip:"Pistol squats are advanced. Build up to them: start with assisted versions holding a doorframe or TRX band. Progress through box pistol squats (sitting onto a bench) before attempting full pistols. The single-leg strength transfers directly to driving and finishing in basketball.",rpe:9},

{id:65,name:"COSSACK SQUAT",type:"strength",muscle:"lower",
 muscles:["Adductors","Quadriceps","Glutes","Hamstrings","Hip Flexors"],primary:"Adductors",diff:"Intermediate",
 equipment:"None (add dumbbell to progress)",
 benefit:"Deep lateral squat that builds hip mobility and inner thigh strength — directly improves lateral defensive movement and reduces groin injury risk.",
 steps:[
   {title:"Wide Stance",fig:"stand",desc:"Stand with feet very wide apart (about 2x shoulder-width). Toes pointed slightly outward. Arms in front for balance."},
   {title:"Shift & Squat to One Side",fig:"squat_q",desc:"Shift your weight to your RIGHT leg and squat down as deep as possible over your RIGHT foot. Your LEFT leg stays straight with the toes pointing up. Keep your RIGHT heel flat and chest tall."},
   {title:"Shift to Other Side",fig:"squat_q",desc:"Push through your RIGHT foot and shift your weight to your LEFT side, squatting deep over your LEFT foot. Your RIGHT leg goes straight. Continue alternating side to side."},
 ],
 cues:["Squatting foot stays FLAT — heel never lifts","Straight leg toes point to ceiling","Chest stays tall — don't fold forward","Go as deep as your mobility allows — depth improves over time"],
 tip:"Cossack squats are one of the best exercises for basketball lateral mobility. They open up the hips, strengthen the adductors, and improve the deep range of motion needed for defensive slides. Start bodyweight 3×8 each side, add a dumbbell goblet hold to progress.",rpe:7},

{id:66,name:"NORDIC HAMSTRING CURL",type:"strength",muscle:"lower",
 muscles:["Hamstrings","Glutes","Core","Calves"],primary:"Hamstrings",diff:"Advanced",
 equipment:"Partner or Anchored Surface",
 benefit:"The gold standard for hamstring injury prevention. Eccentric hamstring strength dramatically reduces the risk of hamstring strains and ACL injuries in basketball.",
 steps:[
   {title:"Kneel with Anchored Feet",fig:"stand",desc:"Kneel on a pad with your feet anchored under something heavy (partner holding your ankles, loaded barbell, or bench). Body upright from knees to head."},
   {title:"Lean Forward Slowly",fig:"plank",desc:"Keeping your body STRAIGHT from knees to head, slowly lean forward by extending at the knees. Fight gravity with your hamstrings — control the descent for 3-5 seconds. Go as far as you can before you lose control."},
   {title:"Catch & Push Back",fig:"pushup_down",desc:"When you can no longer hold the lean, catch yourself with your hands in a push-up position. Use a small push-up to help yourself back to the starting position. Your hamstrings do the work on the way DOWN — that's the key part."},
 ],
 cues:["Body stays STRAIGHT — don't bend at the hips","The SLOW DESCENT is the exercise — control it","3-5 second lowering phase","Use hands to assist on the way back up — that's okay"],
 tip:"Research shows Nordic curls reduce hamstring injuries by up to 51%. Start with just 3×3 reps — the eccentric load is intense. Progress to 3×6 over several weeks. Even partial range of motion is hugely beneficial. Every basketball player should do these.",rpe:9},

{id:67,name:"DUMBBELL THRUSTER",type:"strength",muscle:"full",
 muscles:["Quadriceps","Glutes","Shoulders","Triceps","Core"],primary:"Quadriceps",diff:"Intermediate",
 equipment:"Dumbbells",
 benefit:"Combines a front squat with an overhead press in one explosive movement — builds the full-body power used in rebounding, outlet passes, and contested layups.",
 steps:[
   {title:"Front Rack Position",fig:"stand",desc:"Hold dumbbells at shoulder height with palms facing each other. Feet shoulder-width apart. Elbows high, core braced."},
   {title:"Squat Down",fig:"squat_q",desc:"Perform a full squat — hips below parallel, chest tall, elbows high. Keep the dumbbells at shoulder height throughout the descent."},
   {title:"Explode Up & Press",fig:"stand",desc:"Drive explosively out of the squat. As you reach the top, use the momentum to press the dumbbells overhead in one fluid motion. Lock out arms at the top, then lower the dumbbells back to shoulders for the next rep."},
 ],
 cues:["One fluid motion — squat directly into press","Use LEG DRIVE to launch the press — don't muscle it","Full depth squat — no half reps","Lock out arms fully overhead"],
 tip:"Thrusters build the kind of full-body explosive power that translates to basketball — jumping for rebounds while reaching overhead, powering through contact for layups. Start with 15-20 lb dumbbells for 3×10, progress to heavier weight for 4×6.",rpe:8},

{id:68,name:"GLUTE BRIDGE",type:"strength",muscle:"lower",
 muscles:["Glutes","Hamstrings","Core","Hip Flexors"],primary:"Glutes",diff:"Beginner",
 equipment:"None",
 benefit:"Fundamental glute activation exercise — builds the hip extension power behind every jump, sprint, and defensive slide in basketball.",
 steps:[
   {title:"Lie on Your Back",fig:"bridge",desc:"Lie face up with knees bent, feet flat on the floor hip-width apart. Arms at your sides, palms down. Feet about 12 inches from your glutes."},
   {title:"Bridge Up",fig:"bridge",desc:"Push through your heels and squeeze your glutes to lift your hips until your body forms a straight line from knees to shoulders. Hold for 1-2 seconds at the top. Squeeze your glutes HARD."},
   {title:"Lower with Control",fig:"bridge",desc:"Slowly lower your hips back to the floor. Don't just drop — take 2 seconds to descend. Tap the floor lightly and immediately bridge back up."},
 ],
 cues:["SQUEEZE glutes hard at the top — hold 1-2 seconds","Push through HEELS — not toes","Straight line from knees to shoulders at top","Don't hyperextend your lower back — stop when hips are level"],
 tip:"Glute bridges are the foundation of hip power. Many basketball players have 'sleepy glutes' from sitting, which kills jumping power and increases injury risk. Do these as a warm-up (2×15) before every session and as a strength exercise (3×20 or add weight) twice a week.",rpe:4},

{id:69,name:"DUMBBELL SNATCH",type:"power",muscle:"full",
 muscles:["Glutes","Hamstrings","Shoulders","Trapezius","Core"],primary:"Glutes",diff:"Advanced",
 equipment:"Dumbbell",
 benefit:"Single-arm explosive power from floor to overhead — develops the full-body coordination and explosiveness needed for rebounds, blocks, and athletic plays.",
 steps:[
   {title:"Setup",fig:"squat_q",desc:"Stand with feet shoulder-width apart, dumbbell on the floor between your feet. Hinge at the hips to grip it with one hand. Back flat, hips lower than shoulders, free arm out for balance."},
   {title:"Explode Upward",fig:"stand",desc:"In one explosive motion, drive through your legs and pull the dumbbell straight up close to your body. As it passes your chest, punch your hand to the ceiling and catch the weight overhead with a locked arm. Your hips, knees, and arm all extend simultaneously."},
   {title:"Control Down",fig:"squat_q",desc:"Lower the dumbbell back to shoulder height, then to hip height, then back to the floor with control. Reset your position and repeat. Do all reps on one arm, then switch."},
 ],
 cues:["One explosive motion — don't muscle it with your arm","Drive with your LEGS first — the arm follows","Lock out overhead — bicep by your ear","Start light until you have the timing down"],
 tip:"The dumbbell snatch is one of the most basketball-specific power exercises — it's basically the same movement pattern as jumping for a rebound with one hand. Start light (15-20 lb) and focus on technique. Progress to 3×5 each arm with heavier weight.",rpe:8},

// ── POWER & PLYOMETRICS (Full Catalog) ──────────────────

{id:70,name:"180 JUMP SQUAT",type:"power",muscle:"lower",
 muscles:["Quadriceps","Glutes","Calves","Core","Hip Flexors"],primary:"Quadriceps",diff:"Intermediate",
 equipment:"None",
 benefit:"Adds rotational power to the jump squat — develops the mid-air body control and turning ability needed for reverse layups, spin moves, and defensive recovery.",
 steps:[
   {title:"Quarter Squat",fig:"squat_q",desc:"Stand with feet shoulder-width apart. Lower into a quarter squat, loading your legs. Arms swing back behind you for momentum."},
   {title:"Jump & Rotate 180°",fig:"jump",desc:"Explode upward while rotating your body 180 degrees in the air. Use your core and arm swing to drive the rotation. Land facing the opposite direction you started."},
   {title:"Absorb & Repeat",fig:"squat_q",desc:"Land softly in a quarter squat, absorbing the impact through your legs. Immediately load for the next jump, rotating 180 degrees back to your original facing. Alternate rotation direction."},
 ],
 cues:["Land SOFTLY — quiet feet, bent knees","Core drives the rotation — not your shoulders","Full 180° rotation — don't cheat short","Pause between reps if needed for balance"],
 tip:"180 jump squats build the rotational power for spin moves, reverse layups, and defensive pivots. Start with 3×6 reps. Focus on controlled landings before adding speed. Progress to continuous reps without pausing.",rpe:8},

{id:71,name:"EXPLOSIVE SPLIT SQUAT JUMP",type:"power",muscle:"lower",
 muscles:["Quadriceps","Glutes","Hamstrings","Calves","Core"],primary:"Quadriceps",diff:"Intermediate",
 equipment:"None",
 benefit:"Plyometric lunge that develops single-leg explosive power — translates directly to first-step quickness and driving to the basket.",
 steps:[
   {title:"Lunge Position",fig:"lunge",desc:"Start in a lunge position — RIGHT foot forward, LEFT foot back. Both knees at about 90 degrees. Torso upright, core braced."},
   {title:"Explode Up & Switch",fig:"jump",desc:"Explode upward off both feet, jumping as high as possible. While airborne, switch your legs so you land with LEFT foot forward, RIGHT foot back."},
   {title:"Land & Absorb",fig:"lunge",desc:"Land softly in a lunge position with the opposite leg forward. Absorb the impact by bending into the lunge. Immediately explode up again to switch legs. Continue alternating."},
 ],
 cues:["Land SOFTLY in a full lunge — don't short it","Both feet leave the ground on every jump","Arms pump to generate height","Chest stays tall — don't lean forward on landing"],
 tip:"These build the explosive single-leg power that makes first steps deadly. Start with 3×6 each leg. Rest 60-90 seconds between sets. Quality over quantity — every jump should be maximum effort with a controlled landing.",rpe:8},

{id:72,name:"AGILITY LADDER DRILL",type:"power",muscle:"lower",
 muscles:["Calves","Quadriceps","Hip Flexors","Core","Hamstrings"],primary:"Calves",diff:"Beginner",
 equipment:"Agility Ladder (or tape lines on floor)",
 benefit:"Develops rapid foot coordination, ankle stability, and neuromuscular speed — the foundation of quick defensive footwork and fast breaks.",
 steps:[
   {title:"Two Feet In Each Box",fig:"stand",desc:"Stand at one end of the ladder. Run through placing BOTH feet in each box as fast as possible. Stay on the balls of your feet, pumping your arms. Drive your knees up."},
   {title:"Lateral Shuffle",fig:"stand",desc:"Stand beside the ladder. Side-step through, placing both feet in each box. Stay low in an athletic stance. Face the same direction the entire time. Go down and back."},
   {title:"Ickey Shuffle (In-In-Out)",fig:"stand",desc:"Start beside the ladder. Step IN with your lead foot, IN with your trail foot, then OUT with your lead foot to the other side. Repeat down the ladder in a zigzag pattern. This builds the lateral footwork for defensive slides."},
 ],
 cues:["BALLS OF FEET — never flat-footed","Quick, light contacts — don't stomp","Eyes up — not looking at your feet","Pump your arms — they drive foot speed"],
 tip:"Ladder drills are a basketball staple. Do them as part of every warm-up (5-10 minutes). Key patterns for basketball: two-feet-in-each, lateral shuffle, Ickey shuffle, one-foot hop, and crossover steps. Focus on speed AND accuracy — sloppy fast feet don't help on the court.",rpe:6},

{id:73,name:"CLAP PUSH-UP",type:"power",muscle:"upper",
 muscles:["Chest","Triceps","Anterior Deltoids","Core"],primary:"Chest",diff:"Advanced",
 equipment:"None",
 benefit:"Develops upper body explosive power — the same rapid force production needed for chest passes, blocking shots, and finishing through contact.",
 steps:[
   {title:"Push-up Position",fig:"pushup_up",desc:"Start in a standard push-up position — hands slightly wider than shoulders, body in a straight line from head to heels, core braced."},
   {title:"Lower & Explode",fig:"pushup_down",desc:"Lower your chest to the floor with control, then EXPLODE upward as hard as you can so your hands leave the ground. Quickly clap your hands together while airborne."},
   {title:"Land & Absorb",fig:"pushup_up",desc:"Land with soft elbows (slightly bent), absorbing the impact. Immediately lower into the next rep. Maintain your plank position throughout — hips don't sag or pike."},
 ],
 cues:["EXPLODE off the floor — maximum force on every rep","Land with SOFT elbows — never locked out","Body stays rigid — no hip sag","Quality over quantity — stop when you can't clap"],
 tip:"Clap push-ups build the explosive chest and tricep power for chest passes and absorbing contact. You should be able to do 20+ regular push-ups before attempting these. Start with 3×5 and focus on height and control. Rest fully between sets.",rpe:8},

{id:74,name:"FROG JUMP",type:"power",muscle:"lower",
 muscles:["Glutes","Quadriceps","Hamstrings","Calves","Core"],primary:"Glutes",diff:"Intermediate",
 equipment:"None",
 benefit:"Horizontal explosive power from a deep squat — develops the launching ability needed for diving for loose balls, rebounding distance, and closing out.",
 steps:[
   {title:"Deep Squat",fig:"squat_q",desc:"Drop into a deep squat with your feet wider than shoulder-width. Touch your fingertips to the floor between your feet. Chest up, back flat."},
   {title:"Jump Forward",fig:"jump",desc:"Explode FORWARD and UPWARD, extending your hips, knees, and ankles fully. Swing your arms forward for momentum. Try to cover as much distance as possible."},
   {title:"Land & Reset",fig:"squat_q",desc:"Land in the deep squat position, absorbing the impact softly. Fingertips touch the floor again. Immediately explode into the next jump. Continue for the prescribed reps or distance."},
 ],
 cues:["Jump FORWARD — not just up. Cover distance","Land softly in a full squat every time","Arms swing forward to drive momentum","Full hip extension at takeoff"],
 tip:"Frog jumps build horizontal power — the explosive quality needed for closing out on shooters, diving for loose balls, and getting into rebounding position quickly. Do 3×8 reps or 4 lengths of the court. Rest 90 seconds between sets.",rpe:8},

{id:75,name:"JUMP ROPE",type:"power",muscle:"lower",
 muscles:["Calves","Quadriceps","Shoulders","Core","Forearms"],primary:"Calves",diff:"Beginner",
 equipment:"Jump Rope",
 benefit:"Develops foot speed, ankle stiffness, coordination, and cardio endurance — the foundation of quick lateral movement and staying light on your feet all game.",
 steps:[
   {title:"Basic Bounce",fig:"stand",desc:"Hold rope handles at hip height, elbows close to your body. Jump just high enough to clear the rope — about 1-2 inches off the ground. Land on the balls of your feet with soft knees."},
   {title:"Single Leg Hops",fig:"stand",desc:"Once comfortable with two-foot bouncing, switch to hopping on one foot for 10 reps, then the other foot for 10 reps. This builds ankle stability and calf endurance for each leg independently."},
   {title:"Boxer Shuffle",fig:"stand",desc:"Shift your weight side to side as you jump, mimicking a boxer's shuffle. LEFT foot lands, then RIGHT foot lands, alternating. This builds the lateral rhythm used in defensive slides."},
 ],
 cues:["Small jumps — just clear the rope","Wrists spin the rope — not your arms","Stay on the balls of your feet","Light and quick — not heavy and slow"],
 tip:"Jump rope is an underrated basketball training tool. It builds the calf endurance and ankle stiffness that keeps you light on your feet for four quarters. Start with 3-minute rounds (30 seconds work, 10 seconds rest). Build to 10 continuous minutes. Mix in single-leg and side-to-side variations.",rpe:5},

{id:76,name:"LATERAL BOUND",type:"power",muscle:"lower",
 muscles:["Glutes","Quadriceps","Adductors","Calves","Core"],primary:"Glutes",diff:"Intermediate",
 equipment:"None",
 benefit:"Single-leg lateral explosive power — develops the side-to-side quickness for defensive slides, crossovers, and cutting to the basket.",
 steps:[
   {title:"Stand on One Leg",fig:"stand",desc:"Stand on your RIGHT foot with a slight bend in your knee. LEFT foot off the ground. Arms ready at your sides."},
   {title:"Bound Sideways",fig:"jump",desc:"Push off your RIGHT foot explosively to the LEFT, driving your body sideways. Cover as much distance as possible. Swing your arms to generate power."},
   {title:"Stick the Landing",fig:"stand",desc:"Land on your LEFT foot ONLY. Absorb the landing with a bent knee — stick it for 2 seconds with good balance. Then immediately bound back to the RIGHT, landing on your RIGHT foot."},
 ],
 cues:["STICK each landing — hold balance for 2 seconds","Drive with the OUTSIDE foot — push away from it","Land softly — quiet, controlled foot contact","Maximum distance on each bound"],
 tip:"Lateral bounds are the most basketball-specific plyometric exercise. They train the exact lateral power used in defensive slides and cutting. Start with 3×6 each direction. Progress to continuous bounds without pausing. The goal is maximum distance with a controlled, balanced landing.",rpe:8},

{id:77,name:"BUTT KICKS",type:"power",muscle:"lower",
 muscles:["Hamstrings","Calves","Quadriceps","Hip Flexors"],primary:"Hamstrings",diff:"Beginner",
 equipment:"None",
 benefit:"Dynamic warm-up exercise that activates the hamstrings and improves running mechanics — essential prep for sprinting and fast break situations.",
 steps:[
   {title:"Light Jog",fig:"stand",desc:"Start jogging in place or moving forward. Stay on the balls of your feet, arms pumping naturally."},
   {title:"Kick Heels to Glutes",fig:"stand",desc:"As you jog, exaggerate your heel kick so each foot comes up to touch your glute. Keep your thighs relatively vertical — the knee doesn't drive forward. The motion is a quick backflip of the foot."},
   {title:"Increase Speed",fig:"stand",desc:"Build up the tempo until you're doing rapid butt kicks at full speed. Each heel should contact (or nearly contact) your glute. Maintain an upright posture — don't lean forward."},
 ],
 cues:["Heels kick UP to your butt — not out behind you","Stay upright — don't lean forward","Quick contacts — light and fast","Pump your arms naturally"],
 tip:"Butt kicks are a staple warm-up drill that activates your hamstrings and grooves proper running mechanics. Do 2×30 seconds as part of your pre-practice warm-up. They pair well with high knees — do one immediately after the other.",rpe:4},

// ── CORE (Full Catalog) ─────────────────────────────────

{id:78,name:"AB WHEEL ROLLOUT",type:"strength",muscle:"core",
 muscles:["Rectus Abdominis","Obliques","Hip Flexors","Lats","Shoulders"],primary:"Rectus Abdominis",diff:"Advanced",
 equipment:"Ab Wheel or Barbell with Plates",
 benefit:"One of the most challenging core exercises — builds the rigid core strength needed for absorbing contact, maintaining balance, and transferring power from legs to upper body.",
 steps:[
   {title:"Kneel Behind Wheel",fig:"plank",desc:"Kneel on a pad with the ab wheel in front of you. Grip the handles with both hands, arms straight. Start with the wheel directly under your shoulders."},
   {title:"Roll Forward",fig:"plank",desc:"Slowly roll the wheel forward, extending your arms and lowering your torso toward the floor. Keep your core TIGHT and back flat — do NOT let your lower back arch. Go only as far as you can control."},
   {title:"Pull Back",fig:"plank",desc:"Squeeze your abs hard and pull the wheel back to the starting position. The return is harder than the extension — use your core, not your hip flexors. Exhale forcefully as you pull back."},
 ],
 cues:["NEVER let your lower back arch — that means you've gone too far","Squeeze abs the ENTIRE time — constant tension","Go only as far as you can CONTROL","Exhale hard on the pull-back"],
 tip:"Ab rollouts build serious core strength, but they're advanced. Start with partial range — roll out only 12-18 inches. Over weeks, gradually extend your range. If your lower back arches at any point, you've gone too far. Do 3×6-8 with perfect form.",rpe:9},

{id:79,name:"BICYCLE CRUNCH",type:"strength",muscle:"core",
 muscles:["Obliques","Rectus Abdominis","Hip Flexors"],primary:"Obliques",diff:"Beginner",
 equipment:"None",
 benefit:"Rotational core exercise that targets the obliques — the muscles that power torso rotation for passing, shooting off the dribble, and defensive pivots.",
 steps:[
   {title:"Lie on Back",fig:"bridge",desc:"Lie face up with your hands behind your head (fingertips, not clasped). Lift both feet off the floor with knees bent at 90 degrees. Lift your shoulders slightly off the ground."},
   {title:"Rotate & Extend",fig:"bridge",desc:"Twist your torso to bring your RIGHT elbow toward your LEFT knee while extending your RIGHT leg straight. The rotation comes from your CORE — don't pull on your neck."},
   {title:"Alternate Sides",fig:"bridge",desc:"Reverse the motion — LEFT elbow to RIGHT knee, LEFT leg extends. Continue alternating in a pedaling motion. Move with control — not speed. Feel the obliques working on each rotation."},
 ],
 cues:["Rotation comes from your CORE — not your neck","Elbows stay wide — don't pull on your head","Extended leg hovers 6 inches off the floor — not high","Slow and controlled — no rushing"],
 tip:"Bicycle crunches are research-backed as one of the best oblique exercises. The rotational strength they build directly transfers to passing power and shooting off the dribble. Do 3×15 each side with slow, controlled reps. Quality over speed.",rpe:5},

{id:80,name:"FLUTTER KICKS",type:"strength",muscle:"core",
 muscles:["Hip Flexors","Lower Abs","Quadriceps","Core"],primary:"Hip Flexors",diff:"Beginner",
 equipment:"None",
 benefit:"Builds lower abdominal and hip flexor endurance — the muscular stamina that keeps your core engaged through four quarters of basketball.",
 steps:[
   {title:"Lie Flat",fig:"bridge",desc:"Lie face up with your legs straight and hands under your glutes or at your sides. Press your lower back into the floor — this is critical. Lift both feet about 6 inches off the ground."},
   {title:"Alternating Kicks",fig:"bridge",desc:"Make small, quick kicks — one foot goes up about 12 inches while the other comes down to 6 inches. Alternate continuously like swimming flutter kicks. Keep your legs mostly straight."},
   {title:"Maintain Position",fig:"bridge",desc:"Continue for the prescribed time. Keep your lower back PRESSED into the floor the entire time. If your back arches, lift your feet higher or stop the set."},
 ],
 cues:["Lower back PRESSED into the floor — never arched","Small, quick kicks — 6-12 inch range","Legs stay relatively straight — slight knee bend okay","Breathe continuously — don't hold your breath"],
 tip:"Flutter kicks build the lower ab endurance that keeps your core active during late-game situations. Do 3×30 seconds. The moment your lower back lifts off the floor, stop — that's your back taking over and can cause injury. Build endurance gradually.",rpe:6},

{id:81,name:"V-UP",type:"strength",muscle:"core",
 muscles:["Rectus Abdominis","Hip Flexors","Obliques"],primary:"Rectus Abdominis",diff:"Intermediate",
 equipment:"None",
 benefit:"Full-range core exercise that works the entire abdominal wall — builds the explosive core strength needed for getting off the floor quickly and sit-up-and-go movements.",
 steps:[
   {title:"Lie Flat",fig:"bridge",desc:"Lie flat on your back with arms extended overhead on the floor and legs straight. Your body forms one straight line."},
   {title:"Fold Up",fig:"stand",desc:"Simultaneously lift your legs AND torso off the floor, reaching your hands toward your toes. Your body forms a V-shape at the top. Keep your legs and arms as straight as possible."},
   {title:"Lower with Control",fig:"bridge",desc:"Slowly lower your legs and torso back to the flat starting position. Don't just crash down — take 2 seconds to lower. Tap the floor lightly, then immediately fold up again."},
 ],
 cues:["Legs AND torso rise simultaneously — not one then the other","Reach for your TOES at the top","Lower slowly — 2 seconds down","Keep legs as straight as possible"],
 tip:"V-ups are a challenging full-range core exercise. If they're too hard at first, start with tuck-ups (knees bent) and progress to straight legs. Do 3×10-12. The ability to explosively engage your full core transfers to every athletic movement in basketball.",rpe:7},

{id:82,name:"WINDSHIELD WIPERS",type:"strength",muscle:"core",
 muscles:["Obliques","Rectus Abdominis","Hip Flexors","Lower Back"],primary:"Obliques",diff:"Advanced",
 equipment:"None",
 benefit:"Advanced rotational core strength — develops the anti-rotation and rotation power needed for driving through contact and torso control in mid-air.",
 steps:[
   {title:"Legs Up",fig:"bridge",desc:"Lie on your back with arms extended out to the sides in a T position, palms down. Lift your legs to vertical — straight up, perpendicular to the floor."},
   {title:"Rotate to One Side",fig:"bridge",desc:"Keeping your legs together and as straight as possible, slowly lower them to the RIGHT side toward the floor. Go as far as you can while keeping your LEFT shoulder on the ground. Feel the oblique stretch."},
   {title:"Return & Go Other Side",fig:"bridge",desc:"Use your core to pull your legs back to vertical, then slowly lower them to the LEFT side. Shoulders stay pinned to the floor throughout. Continue alternating like windshield wipers."},
 ],
 cues:["SHOULDERS stay on the floor — both sides","Move SLOWLY — 3 seconds each direction","Legs stay as straight as possible","The farther you lower, the harder it gets — work your range"],
 tip:"Windshield wipers are an advanced oblique exercise. Start with bent knees (easier) and progress to straight legs. Do 3×6 each side. The rotational core control they build is essential for finishing through contact and maintaining body control in the air.",rpe:8},
