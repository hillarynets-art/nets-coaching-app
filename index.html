      <line x1="47" y1="44" x2="36" y2="62" stroke={c} strokeWidth="3" strokeLinecap="round"/>
      <line x1="36" y1="62" x2="28" y2="78" stroke={a} strokeWidth="3" strokeLinecap="round"/>
      <line x1="28" y1="78" x2="20" y2="84" stroke={c} strokeWidth="2.5" strokeLinecap="round"/>
      <line x1="47" y1="44" x2="58" y2="58" stroke={c} strokeWidth="3" strokeLinecap="round"/>

  <svg viewBox="0 0 100 88" style={{width:"100%",height:"100%"}}>
    <defs>
      <filter id="body-shape" x="-22%" y="-22%" width="144%" height="144%" colorInterpolationFilters="sRGB">
        <feMorphology operator="dilate" radius="3.8" in="SourceGraphic" result="fat"/>
        <feGaussianBlur in="fat" stdDeviation="0.6" result="smooth"/>
        <feComposite in="smooth" in2="fat" operator="atop"/>
      </filter>
    </defs>
    <g filter="url(#body-shape)">
      {FIG[fig]?.(color,accent)||<text x="50" y="44" textAnchor="middle" fill={C.mutedFg} fontSize="10">Exercise</text>}
    </g>
  </svg>
);

/* ─── EXERCISE DATABASE ───────────────────────────────── */
const EXERCISES=[
  /* ── BASKETBALL ── */
  {id:1,name:"DEFENSIVE STANCE",type:"basketball",muscle:"full",
   muscles:["Quads","Glutes","Core","Shoulders"],primary:"Quads",diff:"Beginner",
   equipment:"None",
   benefit:"The foundation of all defence. Every stop, steal and block starts here.",
   steps:[
     {title:"Set Your Base",fig:"stand",desc:"Stand with feet wider than shoulder-width apart. Weight evenly distributed, eyes on your opponent's chest (not the ball)."},
     {title:"Load & Lower",fig:"defense",desc:"Bend your knees, lower your hips — like sitting on a low stool. Keep your back straight and head up. Arms out wide, palms facing up."},
     {title:"Stay Active",fig:"slide_l",desc:"Never flat-footed. Stay on the balls of your feet. Lead with your hips on any lateral movement — do not cross your feet."},
   ],
   cues:["Sit into it — don't lean forward","Eyes on the chest, not the ball","Hands active and wide","Stay on your toes, not heels"],
   tip:"Practise holding this position for 30 seconds without moving. If your thighs burn, you're doing it right.",rpe:5},

  {id:2,name:"LATERAL DEFENSIVE SLIDES",type:"basketball",muscle:"lower",
   muscles:["Quads","Glutes","Hip Abductors","Calves"],primary:"Glutes",diff:"Beginner",
   equipment:"None",
   benefit:"Defensive footwork that lets you stay in front of any ball handler without getting beaten.",
   steps:[
     {title:"Start in D-Stance",fig:"defense",desc:"Load into your defensive stance. Wide base, knees bent, back straight, hands active."},
     {title:"Push & Slide",fig:"slide_l",desc:"Push off your inside foot and slide the outside foot in the direction of movement. Never bring feet together — maintain a wide base throughout."},
     {title:"Reset & Repeat",fig:"defense",desc:"Land softly, immediately reload your stance. Stay low the whole time. Speed comes from staying low, not standing up."},
   ],
   cues:["Push, don't step","Never cross your feet","Stay low throughout","Lead with hips, not upper body"],
   tip:"Put two cones 4–5 metres apart. Slide back and forth for 30 seconds. Keep your stance — the moment you stand up, you lose.",rpe:6},

  {id:3,name:"PIVOT & JAB STEP",type:"basketball",muscle:"lower",
   muscles:["Quads","Calves","Core","Ankles"],primary:"Quads",diff:"Beginner",
   equipment:"None",
   benefit:"Creates space from your defender. Controls the tempo of your offensive possession.",
   steps:[
     {title:"Triple Threat",fig:"squat_q",desc:"Catch the ball and immediately load into triple threat — ball protected, knees bent, ready to shoot, pass or drive."},
     {title:"Establish Pivot",fig:"pivot",desc:"Plant one foot as your pivot foot — you can NEVER lift this foot. Rotate on the ball of that foot, not the heel."},
     {title:"Jab Step",fig:"lunge",desc:"Take a sharp, short jab step in one direction with your free foot. Read the defender's reaction — if they step back, shoot. If they don't move, crossover and drive."},
   ],
   cues:["Pivot on the ball of your foot","Keep the ball protected","Read the defender after the jab","Stay low — don't pop up"],
   tip:"Do this in slow motion first. Pivot foot is sacred — lifting it is a travel. Repeat until it's muscle memory.",rpe:4},

  /* ── STRENGTH ── */
  {id:4,name:"BACK SQUAT",type:"strength",muscle:"lower",
   muscles:["Quadriceps","Glutes","Hamstrings","Hip Adductors","Core","Calves"],primary:"Quadriceps",diff:"Intermediate",
   equipment:"Barbell",
   benefit:"Builds explosive leg power for jumping, sprinting and holding defensive positions under pressure.",
   steps:[
     {title:"Set Up",fig:"stand",desc:"Bar sits on your UPPER TRAPS (not your neck — padding should not be needed). Feet shoulder-width, toes out 15–30°. Take a big breath into your belly, brace core hard like you're about to take a punch."},
     {title:"Descend",fig:"squat_q",desc:"Push hips back and DOWN at the same time. Knees track in line with your toes — NEVER let them cave inward. Chest stays tall throughout. Descend to at least parallel (thighs horizontal) where mobility allows. Do not let your lower back round."},
     {title:"Drive Up",fig:"squat_deep",desc:"At the bottom, drive through your WHOLE foot (not just heels). Push the floor away. Knees stay tracking over toes on the way up. Squeeze glutes as you reach the top. Exhale on the ascent."},
   ],
   cues:["Spread the floor — screw your feet outward to activate glutes","Knees track over toes — NEVER cave inward","Big belly breath and brace before EVERY rep","Chest tall the whole way down"],
   tip:"Warm-up ramp before working sets: empty bar × 8 → 50% × 5 → 70% × 3 → 90% × 1 → work sets. Start with just the bar on day 1 — depth and form before any weight is added. Two most common injuries: (1) knee cave — reduce weight immediately; (2) lower back rounding at the bottom — work on hip and ankle mobility. Film yourself from front and side every session. Tempo: 2–3 seconds down, 1 second up.",rpe:8},

  {id:5,name:"ROMANIAN DEADLIFT",type:"strength",muscle:"lower",
   muscles:["Hamstrings","Glutes","Lower Back","Core","Calves"],primary:"Hamstrings",diff:"Beginner",
   equipment:"Barbell or Dumbbells",
   benefit:"Reduces ACL injury risk and builds hamstring strength critical for your first step and landing mechanics.",
   steps:[
     {title:"Start Position",fig:"stand",desc:"Stand tall, bar or dumbbells resting against your thighs. Soft (slight) bend in the knees that stays FIXED throughout — do not let it change. Back flat, shoulders back, core braced."},
     {title:"Hip Hinge",fig:"hinge_q",desc:"Push your hips BACK — imagine touching a wall behind you with your glutes. The bar drags down your thighs and shins as you lower. Back stays completely flat — any rounding puts the load on your spine, not your hamstrings."},
     {title:"Full Stretch & Return",fig:"hinge_deep",desc:"Lower until you feel a strong stretch in your hamstrings — usually just below the knee. Your depth is when your back can no longer stay flat. Drive hips forward to return. Squeeze glutes fully at the top."},
   ],
   cues:["Hips go BACK — not down","Bar stays in contact with legs the whole way","Back flat — any rounding means you've gone too far","Feel the hamstring stretch — that's your depth"],
   tip:"The RDL is not a squat and not a conventional deadlift — the knees barely move. Practice the hip hinge with just your bodyweight first: hands on hips, push hips back until you feel your hamstrings load. Tempo: 3 seconds down (feel the stretch), 1 second pause, 1 second up — the stretch under load is where hamstring strength is built. The most common mistake is bending the knees too much and turning it into a squat. Progressive overload: add 2.5kg per side when you can complete all sets with a flat back and full hamstring stretch.",rpe:7},

  {id:6,name:"SPLIT SQUAT",type:"strength",muscle:"lower",
   muscles:["Quadriceps","Glutes","Hip Flexors","Core"],primary:"Quadriceps",diff:"Beginner",
   equipment:"Bodyweight / Dumbbells",
   benefit:"Fixes imbalances between legs — critical for safe landing and powerful cutting movements.",
   steps:[
     {title:"Start Position",fig:"lunge_stand",desc:"Step one foot forward, one foot back. Both feet hip-width for balance. Torso upright, core tight."},
     {title:"Lower Down",fig:"lunge",desc:"Drop your BACK KNEE straight toward the floor. Front shin stays nearly vertical. Front knee does not drive forward past your toes."},
     {title:"Push Back Up",fig:"lunge_stand",desc:"Drive through your front heel to push back up to start. Maintain an upright torso throughout. Equal reps on both legs."},
   ],
   cues:["Back knee goes DOWN, not forward","Front shin stays vertical","Torso tall — don't hunch","Drive through the heel"],
   tip:"Hold onto a wall or rack for balance when learning. Bodyweight only until you can do 3 sets of 12 with perfect form.",rpe:7},

  {id:7,name:"PUSH-UP",type:"strength",muscle:"upper",
   muscles:["Chest","Triceps","Shoulders","Core"],primary:"Chest",diff:"Beginner",
   equipment:"None",
   benefit:"Upper body pressing strength for physical play, fighting through screens and protecting the ball.",
   steps:[
     {title:"High Plank Start",fig:"pushup_up",desc:"Hands slightly wider than shoulders, directly under your chest. Body forms a straight line from head to heels. Core and glutes squeezed."},
     {title:"Lower with Control",fig:"pushup_down",desc:"Lower your chest toward the floor, elbows at 45° from your body (not flared out wide). Chest should almost touch the ground."},
     {title:"Press Back Up",fig:"pushup_up",desc:"Push the floor away to return to the start. Body stays rigid like a plank — don't let your hips sag or pike up."},
   ],
   cues:["Elbows at 45° — not flared","Body like a rigid plank","Chest to the floor on each rep","Squeeze your core throughout"],
   tip:"Can't do a full push-up yet? Start from your knees — keep a straight line from knees to head. Tempo protocol: 2 seconds down, 1 second pause at the bottom, 1 second up. The pause at the bottom eliminates the stretch reflex and forces true muscle strength. Progressive overload: add reps until 3×15 is easy, then elevate feet on a bench for added difficulty before attempting weighted push-ups.",rpe:6},

  {id:8,name:"PULL-UP",type:"strength",muscle:"upper",
   muscles:["Lats","Biceps","Rear Deltoids","Core"],primary:"Lats",diff:"Intermediate",
   equipment:"Pull-up Bar",
   benefit:"Back and grip strength for contesting shots, rebounding and maintaining body control in the air.",
   steps:[
     {title:"Dead Hang",fig:"hang",desc:"Grip the bar slightly wider than shoulders, palms facing away. Hang with arms fully extended. Engage your core — no swinging."},
     {title:"Initiate the Pull",fig:"hang",desc:"Retract your shoulder blades DOWN and BACK before bending your elbows — this activates the lats and protects the shoulder joint. Think: 'pull elbows to pockets.' This is the same scapular retraction that initiates the row."},
     {title:"Chin Over Bar",fig:"pull_top",desc:"Pull until your chin clears the bar. Briefly hold at the top. Lower with full control — 2–3 seconds down. Full dead hang at the bottom before the next rep (no kipping or bouncing)."},
   ],
   cues:["Scapula DOWN and BACK before elbows bend","Pull elbows to pockets — not toward the ceiling","Full dead hang at the bottom between reps","2–3 seconds lowering — the eccentric builds the most strength"],
   tip:"Can't do a pull-up yet? Negative pull-ups (jump to top position, lower slowly for 5 seconds) build pull-up strength faster than anything. Per progressive overload principles: track your reps and attempt one more each session. When you can do 3×8 bodyweight, add weight with a belt. The slow lowering phase (eccentric) is where your lats develop — never drop from the top.",rpe:8},

  {id:9,name:"CALF RAISE",type:"strength",muscle:"lower",
   muscles:["Gastrocnemius","Soleus","Achilles"],primary:"Gastrocnemius",diff:"Beginner",
   equipment:"Step / Platform",
   benefit:"Protects your achilles and ankles — the most common basketball injury. Also adds to your vertical jump.",
   steps:[
     {title:"Set Up on Edge",fig:"stand",desc:"Stand with the balls of your feet on the edge of a step. Heels hanging off. Hold something for balance — not to support your weight."},
     {title:"Rise Up",fig:"tiptoe",desc:"Push up onto your tiptoes as HIGH as possible. Squeeze your calves at the top. Hold for 1–2 seconds. Don't rush this."},
     {title:"Lower Slowly",fig:"stand",desc:"Lower your heels BELOW the step level — feel the deep stretch in your calves and achilles. Take 3 seconds going down. This is where the gains happen."},
   ],
   cues:["3 seconds down — always","Full range of motion","Squeeze hard at the top","One leg at a time for more challenge"],
   tip:"Fast calf raises are wasted effort. Slow and full range. Feel the stretch at the bottom — that's what protects your achilles.",rpe:6},

  {id:10,name:"PLANK",type:"strength",muscle:"core",
   muscles:["Core","Glutes","Shoulders","Hip Flexors"],primary:"Core",diff:"Beginner",
   equipment:"None",
   benefit:"Core stability for change of direction, absorbing contact and maintaining form late in games.",
   steps:[
     {title:"Forearm Position",fig:"plank",desc:"Forearms flat on the floor, elbows under shoulders. Hands relaxed — don't grip the floor."},
     {title:"Lift & Align",fig:"plank",desc:"Lift your body so only forearms and toes touch the floor. Body forms a straight line from head to heel. Don't let your hips sag or rise."},
     {title:"Breathe & Hold",fig:"plank",desc:"Breathe normally. Squeeze your glutes and core — imagine someone is about to poke your belly. Hold position. Don't hold your breath."},
   ],
   cues:["Hips level — no sagging or piking","Squeeze glutes and core together","Breathe normally throughout","Eyes to the floor, neutral neck"],
   tip:"Start with 20-second holds. Quality over time — a solid 20 seconds is better than a sloppy 60 seconds.",rpe:5},

  /* ── POWER ── */
  {id:11,name:"BOX JUMP",type:"power",muscle:"lower",
   muscles:["Quads","Glutes","Calves","Core"],primary:"Quads",diff:"Intermediate",
   equipment:"Box / Platform",
   benefit:"Develops the fast-twitch explosive power that gets you above the rim and beats opponents to loose balls.",
   steps:[
     {title:"Athletic Stance",fig:"squat_q",desc:"Stand in front of the box in an athletic stance, feet hip-width. Swing arms back and load your hips — dip slightly into a quarter squat."},
     {title:"Explode",fig:"jump",desc:"Drive through both feet simultaneously, swing arms UP explosively. Pull your knees toward your chest at the peak of the jump."},
     {title:"Land Soft",fig:"land",desc:"Land with BOTH feet on the box simultaneously, knees bent to absorb impact. Land toe-to-heel, softly — loud landings mean your joints are absorbing force your muscles should be. STEP DOWN, never jump down — jumping off a box multiplies knee/ankle impact dramatically."},
   ],
   cues:["Arms drive the jump","Pull knees up at the peak","Land SOFT and quiet — loud = injury risk","Step down — NEVER jump off the box"],
   tip:"⚠️ Always step down after landing — jumping off the box is one of the most common causes of ankle and knee injury in plyometric training. Start with a 30cm box. The standard for progression: only increase box height when your landing is consistently soft and controlled. Never sacrifice landing quality for height.",rpe:8},

  {id:12,name:"JUMP SQUAT",type:"power",muscle:"lower",
   muscles:["Quads","Glutes","Calves","Core","Hip Flexors"],primary:"Quads",diff:"Beginner",
   equipment:"Bodyweight",
   benefit:"Teaches your muscles to produce maximum force rapidly — the exact demand of jumping for a rebound or shot.",
   steps:[
     {title:"Quarter Squat Load",fig:"squat_q",desc:"Feet shoulder-width, toes pointing straight ahead or slightly out. Dip into a quarter squat, swinging arms back. Weight evenly across your whole foot. Load your hips — this countermovement is what generates power."},
     {title:"Explode Up",fig:"jump",desc:"Drive explosively through BOTH feet simultaneously. Swing arms up. Achieve full triple extension — hips, knees and ankles all fully extended at takeoff. This is what separates a powerful jump from a weak one."},
     {title:"Land Safely",fig:"land",desc:"Land toe-to-heel with knees bent and soft — absorb the impact through your legs, not your joints. Knees must track over your toes on landing. Never land with straight (locked) legs. Reload and repeat OR step back to reset between reps."},
   ],
   cues:["Triple extension at takeoff — hips, knees, ankles","Swing arms for extra height","Land soft — knees bent, tracking over toes","NEVER land with straight legs"],
   tip:"Landing mechanics are as important as the jump. Straight-leg landings are a leading cause of knee injuries in athletes. Start with 5 reps max per set focusing on soft, controlled landings before increasing speed or volume.",rpe:7},

  {id:13,name:"MEDICINE BALL SLAM",type:"power",muscle:"full",
   muscles:["Core","Lats","Shoulders","Hips"],primary:"Core",diff:"Beginner",
   equipment:"Medicine Ball",
   benefit:"Full-body power in a downward direction — translates to rebounding toughness and contact absorption.",
   steps:[
     {title:"Overhead Load",fig:"standing_reach",desc:"Hold the ball with both hands. Raise it directly overhead, rise onto your toes slightly. Get tall — full extension."},
     {title:"Slam Down",fig:"hinge_q",desc:"Slam the ball INTO the floor as hard as possible. Hinge at the hips, pull your abs in tight, and use your whole body — not just arms."},
     {title:"Catch & Reset",fig:"squat_q",desc:"Catch the ball as it bounces back (or pick it up). Reset your stance. Take a breath. Each rep should be maximum effort."},
   ],
   cues:["Full extension overhead first","Use your WHOLE body — not just arms","Slam as hard as possible","Catch and reset between reps"],
   tip:"Don't use a bouncy rubber ball — use a dead ball that absorbs the impact. Aim for the same spot every time.",rpe:7},

  /* ── AGILITY ── */
  {id:14,name:"LATERAL SHUFFLE",type:"agility",muscle:"lower",
   muscles:["Quads","Glutes","Hip Abductors","Calves"],primary:"Glutes",diff:"Beginner",
   equipment:"Cones",
   benefit:"Footwork speed and lateral quickness — essential for staying in front of ball handlers.",
   steps:[
     {title:"Set Cones & Stance",fig:"defense",desc:"Place two cones 4–5 metres apart. Start at one cone in a defensive stance. Loaded, low, and ready."},
     {title:"Shuffle Across",fig:"slide_l",desc:"Push off your inside foot and shuffle laterally — quick, choppy steps. Never cross your feet. Stay low the whole way."},
     {title:"Touch & Change",fig:"defense",desc:"Touch the cone with your outside hand, immediately change direction and shuffle back. Stay in your stance — don't pop up between reps."},
   ],
   cues:["Stay LOW throughout","Never cross your feet","Push — don't step","Maintain your stance at the cone"],
   tip:"Set a timer for 20 seconds. Count your trips. Try to improve your count each session. Speed comes from staying low.",rpe:6},

  {id:15,name:"T-DRILL",type:"agility",muscle:"full",
   muscles:["Quads","Glutes","Calves","Core"],primary:"Quads",diff:"Intermediate",
   equipment:"4 Cones",
   benefit:"Tests and develops multi-directional speed — change of direction, acceleration and deceleration.",
   steps:[
     {title:"Sprint Forward",fig:"jump",desc:"Sprint from Cone A to Cone B (10 yards). Touch the base of Cone B with your RIGHT hand. Don't slow down before the cone."},
     {title:"Shuffle Left & Right",fig:"slide_l",desc:"Shuffle LEFT to Cone C (5 yards). Touch it. Shuffle RIGHT to Cone D (10 yards). Touch it. Stay in a shuffling stance — no crossing feet."},
     {title:"Shuffle & Backpedal",fig:"defense",desc:"Shuffle LEFT back to Cone B. Touch it. Then BACKPEDAL all the way to Cone A. Do not turn your back to run — true backpedal."},
   ],
   cues:["Don't slow before cones","Touch the BASE of each cone","True shuffle — no crossing","Backpedal on the return"],
   tip:"Target time: under 10 seconds for beginners, under 9 seconds as you improve. Time yourself every 2 weeks to track progress.",rpe:8},

  /* ── MOBILITY ── */
  {id:16,name:"HIP 90/90 STRETCH",type:"mobility",muscle:"lower",
   muscles:["Hip External Rotators","Hip Flexors","Glutes"],primary:"Hip Rotators",diff:"Beginner",
   equipment:"None",
   benefit:"Opens the hips for deeper defensive stances, wider cuts and more powerful drives to the basket.",
   steps:[
     {title:"Sit Into Position",fig:"seated_reach",desc:"Sit on the floor. Bring one leg in front at 90° and one leg behind at 90°. Both shins flat on the floor. Sit tall."},
     {title:"Forward Lean",fig:"seated_reach",desc:"Keeping your back straight, hinge forward over your front shin. Feel the deep stretch in the back of your hip. Hold for 30–60 seconds."},
     {title:"Rotate & Switch",fig:"seated_reach",desc:"Sit back upright, then rotate your hips to switch legs. Now your back leg becomes the front. Repeat on the other side."},
   ],
   cues:["Both shins flat on the floor","Hinge from hips — don't round your back","Breathe through the stretch","Hold 60 seconds each side"],
   tip:"This will feel very restricted at first — that's normal. Do this daily and you'll notice massive improvements in hip mobility within 2 weeks.",rpe:3},

  {id:17,name:"ANKLE CIRCLES & DORSIFLEXION",type:"mobility",muscle:"lower",
   muscles:["Ankle","Achilles","Calves"],primary:"Ankle",diff:"Beginner",
   equipment:"None",
   benefit:"Ankle mobility directly impacts squat depth, landing mechanics and injury prevention.",
   steps:[
     {title:"Ankle Circles",fig:"stand",desc:"Lift one foot off the ground. Draw BIG circles with your toes — 10 clockwise, 10 counter-clockwise. Slow and full range. Switch feet."},
     {title:"Wall Ankle Drive",fig:"lunge",desc:"Kneel in a lunge, front foot 5cm from a wall. Drive your front knee toward the wall while keeping your heel flat. Hold 2 seconds. 10 reps each side."},
     {title:"Calf Stretch",fig:"lunge_stand",desc:"Step one foot back, keep it straight. Press that heel flat into the floor. Lean forward until you feel the stretch. Hold 30 seconds each side."},
   ],
   cues:["Keep heel flat on the wall drill","Full circles — don't make them small","Hold the stretch at the end range","Daily is better than occasional"],
   tip:"Before any session, do 10 ankle circles each foot. It takes 60 seconds and significantly reduces ankle sprain risk.",rpe:2},

  /* ── STRETCHING ── */
  {id:18,name:"HIP FLEXOR STRETCH",type:"stretching",muscle:"lower",
   muscles:["Hip Flexors","Psoas","Quad","Groin"],primary:"Hip Flexors",diff:"Beginner",
   equipment:"None",
   benefit:"Tight hip flexors reduce stride length and jump height. Freeing them unlocks power you didn't know you had.",
   steps:[
     {title:"Half-Kneeling Position",fig:"kneel",desc:"Drop one knee to the floor, other foot forward at 90°. Both knees at right angles. Keep your torso upright."},
     {title:"Drive Hips Forward",fig:"kneel",desc:"Gently push your hips FORWARD — not down. You should feel a stretch in the front of your back leg's hip. Don't arch your lower back."},
     {title:"Hold & Breathe",fig:"kneel",desc:"Hold for 30–60 seconds. Breathe slowly and deeply — you'll feel the stretch deepen with each exhale. Switch legs."},
   ],
   cues:["Hips forward, not down","Keep torso tall","Breathe into the stretch","30–60 seconds each side"],
   tip:"Do this every morning and after every session. Basketball players typically have very tight hip flexors from all the court time.",rpe:2},

  {id:19,name:"STANDING HAMSTRING STRETCH",type:"stretching",muscle:"lower",
   muscles:["Hamstrings","Calves","Lower Back"],primary:"Hamstrings",diff:"Beginner",
   equipment:"None",
   benefit:"Flexible hamstrings reduce lower back pain and improve your stride mechanics and change of direction.",
   steps:[
     {title:"Stand Tall",fig:"stand",desc:"Stand upright. Step one foot slightly forward, heel on the ground, toes pointing up. Keep that leg straight."},
     {title:"Hinge Forward",fig:"hinge_q",desc:"Hinge at your hips and reach your hands toward the elevated foot. Keep your back straight — don't round. Feel the pull in the back of your leg."},
     {title:"Hold & Switch",fig:"hinge_q",desc:"Hold for 30–45 seconds, breathing slowly. Release and switch legs. For a deeper stretch, flex your toes back toward your shin."},
   ],
   cues:["Back straight — hinge from hips","Toes flexed back for more stretch","Breathe through it — don't tense","Feel it in the hamstring, not the back"],
   tip:"Best done after training when muscles are warm. Never bounce in a stretch — hold it still.",rpe:2},

  {id:20,name:"QUAD STRETCH",type:"stretching",muscle:"lower",
   muscles:["Quadriceps","Hip Flexors","Knee"],primary:"Quadriceps",diff:"Beginner",
   equipment:"None",
   benefit:"Reduces knee strain and maintains the muscle flexibility needed for deep squats and jump landings.",
   steps:[
     {title:"Balance on One Leg",fig:"stand",desc:"Stand on your left leg. If needed, hold a wall with one hand. Find your balance before reaching for your foot."},
     {title:"Pull Your Foot Up",fig:"quad_stretch",desc:"Bend your right knee and grab your right foot (or ankle) with your right hand. Pull your heel toward your glutes. Keep knees together."},
     {title:"Hold & Switch",fig:"quad_stretch",desc:"Stand tall — don't lean forward. Feel the stretch along the front of your thigh. Hold 30 seconds. Switch and repeat."},
   ],
   cues:["Keep knees together","Stand tall — don't hunch","Foot to glute, not to the side","Use a wall if your balance is shaky"],
   tip:"If you can't reach your foot, use a towel or resistance band looped around your ankle. The stretch is what matters, not the position.",rpe:2},

  /* ── ADVANCED STRENGTH ── */
  {id:21,name:"CONVENTIONAL DEADLIFT",type:"strength",muscle:"full",
   muscles:["Lower Back","Hamstrings","Glutes","Quadriceps","Traps","Core","Calves","Forearms"],primary:"Lower Back",diff:"Intermediate",
   equipment:"Barbell",
   benefit:"The king of strength movements. Develops total-body pulling power critical for rebounding battles and physical dominance.",
   steps:[
     {title:"Setup Over Bar",fig:"deadlift_setup",desc:"Feet shoulder-width (or hip-width), toes can point slightly out. Bar over mid-foot. Hinge down, grip just outside legs. Chest up, back FLAT. Before the bar moves: take a big breath, brace your core hard, and PULL YOUR LATS TIGHT — imagine trying to bend the bar around your legs. This lat tension is what keeps your spine safe."},
     {title:"Pull the Slack — Then Push",fig:"squat_q",desc:"Before lifting: pull the slack out of the bar by applying tension without the bar leaving the floor (you'll hear a click). Now push your feet INTO the floor — do NOT yank with your back. Bar drags up your shins (expect shin contact). Hips and shoulders rise at exactly the same rate."},
     {title:"Lock Out & Lower with Control",fig:"stand",desc:"Drive hips forward to full lockout. Squeeze glutes hard at the top — do NOT hyperextend. Lower under full control by reversing the hip hinge. Take 2–3 seconds on the way down. Brace and pull your lats tight again before the next rep."},
   ],
   cues:["Lats tight — pull the slack before lifting off","PUSH the floor, don't pull your back","Hips and shoulders rise together — this is everything","Back FLAT entire rep — any rounding = stop and reduce weight"],
   tip:"⚠️ High injury risk if done wrong. Warm-up ramp: empty bar × 5 → 50% × 5 → 70% × 3 → 85% × 1 → work set. The 'lats tight, pull the slack' step is what most beginners skip — it's the single most important injury prevention technique in the deadlift. Never round your lower back. Start at 50% of what you think you can lift and film yourself from the side every session. Have an experienced coach review your form before adding real load.",rpe:9},

  {id:22,name:"OVERHEAD PRESS",type:"strength",muscle:"upper",
   muscles:["Shoulders","Triceps","Core","Traps","Rotator Cuff"],primary:"Shoulders",diff:"Intermediate",
   equipment:"Barbell or Dumbbells",
   benefit:"Overhead pressing strength for contested shots, blocking and elevating over defenders at the rim.",
   steps:[
     {title:"Rack Position",fig:"overhead_press_down",desc:"Bar at upper chest, elbows slightly IN FRONT of the bar (not directly below). Hands just outside shoulders, wrists STRAIGHT and stacked — not bent backward. Feet shoulder-width. Squeeze glutes to prevent lower back hyperextension. Brace core before every single rep."},
     {title:"Press Overhead",fig:"overhead_press_up",desc:"Press the bar in a straight line upward. As it passes your forehead, move your head slightly back so the bar clears your face. Drive the bar up and SLIGHTLY BACK. Lock out arms fully at the top — bar stacked over mid-foot, biceps near your ears."},
     {title:"Lockout & Lower",fig:"overhead_press_down",desc:"At the top, complete the lockout with a slight SHRUG of the traps — this is full shoulder range of motion. Lower with control over 2–3 seconds back to the rack position. Re-brace and squeeze glutes before next rep."},
   ],
   cues:["Squeeze glutes throughout — prevents lower back arch","Wrists straight — stacked over the bar","Press up and slightly BACK — not straight up","Lockout with a slight shrug at the top"],
   tip:"Warm-up ramp: empty bar × 8 → 50% × 5 → 70% × 3 → work sets. Two key injury points: (1) wrists bent backward under load — keep them straight; (2) lower back arching — squeeze your glutes before every rep, that's what prevents it. If shoulder pain appears, switch to dumbbells with a neutral (hammer) grip. Tempo: 1 second up, 2–3 seconds down.",rpe:7},

  {id:23,name:"DIPS",type:"strength",muscle:"upper",
   muscles:["Triceps","Chest","Shoulders","Core","Serratus Anterior"],primary:"Triceps",diff:"Intermediate",
   equipment:"Parallel Bars",
   benefit:"Triceps and chest strength for push-offs, protecting the ball and finishing through contact.",
   steps:[
     {title:"Mount the Bars",fig:"dip_up",desc:"Grip parallel bars, arms straight. Lean slightly forward (about 10–15°) for basketball — this keeps triceps as the focus. Cross your feet behind you for stability. Core tight before descending."},
     {title:"Lower Slowly",fig:"dip_down",desc:"Bend elbows and lower until your upper arms are at least PARALLEL to the floor. Elbows flare slightly outward at about 45° — NOT straight back (which strains the shoulder joint), NOT all the way out (elbow stress). Controlled 2-second descent."},
     {title:"Press Back Up",fig:"dip_up",desc:"Push through your palms to straighten your arms fully. Squeeze triceps at the top. Maintain your slight forward lean throughout. Never lock out with a jerk — smooth extension only."},
   ],
   cues:["Elbows at 45° — not straight back, not flared wide","Lower to upper arms parallel — don't go deeper","Slight forward lean throughout","2–3 seconds down — control every rep"],
   tip:"⚠️ Dips place high stress on the shoulder joint. Pain distinction: muscle burn in triceps/chest = normal. Sharp pain or clicking in the FRONT of the shoulder = stop immediately, this is joint stress not muscle fatigue. Never go below parallel — deeper range dramatically increases shoulder impingement risk. Eccentric tempo (2–3 seconds down) builds more strength than fast reps AND reduces joint stress. If you can't yet do bodyweight dips, do bench dips (feet on floor) first to build the strength pattern. Progressive overload: add reps before adding weight.",rpe:7},

  {id:24,name:"BARBELL ROW",type:"strength",muscle:"upper",
   muscles:["Lats","Rhomboids","Middle Traps","Rear Deltoids","Biceps","Lower Back","Core"],primary:"Lats",diff:"Intermediate",
   equipment:"Barbell",
   benefit:"Pulling strength for boxing out, contesting passes and maintaining upper body balance against constant pressing.",
   steps:[
     {title:"Hip Hinge Setup",fig:"row_start",desc:"Feet shoulder-width. Hinge forward 45–60° at the hips — back STRAIGHT, not rounded. Grip just outside shoulder-width with overhand grip. Core braced hard. Bar hangs directly below your shoulders, not your chest."},
     {title:"Pull to Lower Chest",fig:"row_pull",desc:"Initiate the pull by retracting your shoulder blades FIRST — then drive elbows straight back. Pull bar to your lower chest/upper abdomen. Squeeze shoulder blades together hard at the top. Bar path should stay close to your body."},
     {title:"Lower with Control",fig:"row_start",desc:"Lower with full arm extension and controlled tempo. HOLD your hip hinge position every rep — the instant your torso rises, the lower back takes over. That's how rows cause back injuries."},
   ],
   cues:["Shoulder blades retract FIRST — then pull","Elbows back — not up toward the ceiling","Bar to lower chest, not chin or upper chest","Back flat entire set — hinge doesn't move"],
   tip:"Warm-up ramp: empty bar × 8 → 50% × 5 → 70% × 3 → work sets. The most common row injury is lower back strain from losing the hip hinge position mid-set — the instant your torso starts rising, the weight is too heavy. Tempo matters here: 1 second pull, 1 second hold at top (squeeze), 2–3 seconds lower. Think 'row a boat' not 'curl a bar' — if your arms tire first, your back muscles aren't doing the work.",rpe:8},

  {id:25,name:"BULGARIAN SPLIT SQUAT",type:"strength",muscle:"lower",
   muscles:["Quadriceps","Glutes","Hamstrings","Hip Flexors","Core","Calves"],primary:"Quadriceps",diff:"Advanced",
   equipment:"Bench + Dumbbells",
   benefit:"Advanced single-leg strength for powerful cuts, sprinting mechanics and injury-resilient landing.",
   steps:[
     {title:"Rear Foot Elevated",fig:"lunge_stand",desc:"Place your rear foot on a bench (laces down, not toes). Step your front foot far enough forward that when you lower, your front shin stays VERTICAL and knee stays over toes. Hips squared forward. Hold dumbbells naturally at your sides."},
     {title:"Lower Straight Down",fig:"lunge",desc:"Drop your rear knee STRAIGHT DOWN toward the floor. Keep your torso upright — do NOT lean forward as this transfers load to the lower back. Front knee tracks in line with your toes the entire way down. Stop just before the rear knee touches."},
     {title:"Drive Through Front Heel",fig:"lunge_stand",desc:"Push through your front foot (full foot, not just heel) to return to start. Squeeze your glutes at the top. Fully extend before the next rep. Complete ALL reps on one leg before switching — don't alternate."},
   ],
   cues:["Front knee tracks over toes — never caving inward","Torso UPRIGHT — forward lean = lower back strain","Lower straight down, not forward","Control the descent — 2–3 seconds down"],
   tip:"⚠️ Two injury risks: (1) knee cave — if your front knee collapses inward as you lower, reduce weight immediately; (2) forward lean — leaning your torso forward shifts stress to your lower back. Start bodyweight only. 3×10 each leg with no wobble before adding any weight. Tempo protocol per the 2025 exercise science consensus: 3 seconds down, 1 second pause at the bottom, 1 second up — the eccentric (lowering) phase is where strength and injury resilience are actually built. Considered one of the most effective single-leg exercises available.",rpe:8},

  /* ── ADVANCED POWER ── */
  {id:26,name:"BROAD JUMP",type:"power",muscle:"lower",
   muscles:["Quads","Glutes","Calves","Core","Hip Flexors"],primary:"Quads",diff:"Intermediate",
   equipment:"Floor Space",
   benefit:"Horizontal explosive power — translates directly to first-step quickness and acceleration off the mark.",
   steps:[
     {title:"Load & Wind Up",fig:"broad_jump_load",desc:"Feet shoulder-width. Swing arms back, drop into a quarter squat, push your hips back. Wind up like a spring — load the energy."},
     {title:"Explode Forward",fig:"jump",desc:"Swing arms forward and drive BOTH feet into the floor simultaneously. Aim for maximum horizontal distance — not height. Full triple extension at takeoff."},
     {title:"Stick the Landing",fig:"land",desc:"Land on both feet simultaneously, knees bent, soft landing. Stick for 2 seconds — a solid landing means your deceleration is as explosive as your takeoff."},
   ],
   cues:["Arms drive the jump","Aim for DISTANCE — not height","Land on both feet simultaneously","Stick the landing for 2 seconds"],
   tip:"Measure your distance with tape on the floor. Track it weekly. Improvement in broad jump directly predicts improvement in first-step quickness.",rpe:8},

  {id:27,name:"SINGLE-LEG CALF RAISE",type:"strength",muscle:"lower",
   muscles:["Gastrocnemius","Soleus","Achilles"],primary:"Gastrocnemius",diff:"Intermediate",
   equipment:"Step / Platform",
   benefit:"Dramatically increases ankle resilience and adds unilateral calf power for explosive single-leg push-off.",
   steps:[
     {title:"Single Foot on Edge",fig:"single_leg_stand",desc:"Stand on one foot on the edge of a step. Other leg bent up behind you. Light touch on a wall for balance only — do not lean on it."},
     {title:"Rise High",fig:"tiptoe",desc:"Drive onto the ball of your foot as high as possible. Squeeze your calf hard at the peak. Hold 1 second. Do not rush."},
     {title:"Slow Lowering",fig:"single_leg_stand",desc:"Lower your heel BELOW the step level over 4 full seconds. Feel the deep achilles stretch. This eccentric phase is what builds injury resilience."},
   ],
   cues:["4 seconds down — every single rep, no exceptions","Full range — heel must go below step level","Squeeze hard at the top, hold 1 second","No double-leg cheat reps — defeats the purpose"],
   tip:"The 4-second eccentric (lowering) phase IS the exercise — this is what the research calls 'eccentric loading' and it's the single most evidence-backed method for preventing and rehabbing achilles tendon injuries. Fast reps are wasted effort here. Start 3×10 each foot, no weight. When easy, add 1×12 then 2×12 then 3×12 before adding a dumbbell. This progressive approach — per 2025 load management research — eliminates the risk of overloading the tendon too quickly.",rpe:7},

  /* ── ADVANCED AGILITY ── */
  {id:28,name:"5-10-5 SHUTTLE",type:"agility",muscle:"full",
   muscles:["Quads","Glutes","Hip Abductors","Calves","Core"],primary:"Quads",diff:"Advanced",
   equipment:"3 Cones",
   benefit:"The gold standard for change-of-direction speed. Tests acceleration, deceleration and lateral quickness together.",
   steps:[
     {title:"Start Position",fig:"defense",desc:"Start straddling the middle cone in an athletic stance. You'll sprint 5 yards to your right first. Get low and coiled — this is a max-effort test."},
     {title:"Sprint & Plant Right",fig:"slide_l",desc:"Explode right, sprint 5 yards to the right cone. Touch the line with your right hand. Plant your outside foot hard to change direction — stay low."},
     {title:"Sprint Left & Return",fig:"jump",desc:"Sprint LEFT 10 yards past the middle to the far left cone. Touch. Sprint back 5 yards to the middle cone. Finish at full speed — run through the line."},
   ],
   cues:["Plant low — don't stand tall at cones","Touch the line — not the cone","Sprint THROUGH the finish line","Time yourself every 2 weeks"],
   tip:"Target time: under 4.4 seconds is excellent for basketball. Under 4.2 is elite. Focus on the plant-and-go — that's where the time is made or lost.",rpe:9},

  {id:29,name:"EURO STEP DRILL",type:"basketball",muscle:"lower",
   muscles:["Hip Abductors","Quads","Core","Glutes"],primary:"Hip Abductors",diff:"Intermediate",
   equipment:"Cones / Court",
   benefit:"Deceptive footwork technique for beating defenders and finishing at the rim with body control.",
   steps:[
     {title:"Gather & Plant",fig:"lunge_stand",desc:"Receive or gather the ball at full speed. Plant your first foot firmly. This is your gather step — absorb momentum into your plant foot."},
     {title:"Step Sideways",fig:"crossover_step",desc:"Your second step goes SIDEWAYS — away from the defender — not forward. Push off your plant foot laterally. Keep the ball secure and low."},
     {title:"Finish",fig:"jump",desc:"Use the momentum from the sideways step to power up and finish at the rim. Protect the ball with your body. Aim for the high point — not straight up."},
   ],
   cues:["Gather foot plants solid","Step 2 is SIDEWAYS — not forward","Keep ball low and protected","Use momentum — don't slow down"],
   tip:"Drill this slowly first — 2 cones 3 feet apart. Walk through the footwork. Once you feel the lateral step, increase speed. Finish with a layup every rep.",rpe:6},

  /* ── ADVANCED BASKETBALL ── */
  {id:30,name:"DEFENSIVE CLOSEOUT",type:"basketball",muscle:"lower",
   muscles:["Quads","Hip Abductors","Calves","Core"],primary:"Quads",diff:"Intermediate",
   equipment:"Cones",
   benefit:"Properly closing out on shooters without flying by them — the most important defensive skill in the modern game.",
   steps:[
     {title:"Sprint Half Distance",fig:"jump",desc:"Sprint hard for the first 2/3 of the distance toward the shooter. Drive at them aggressively — make them uncomfortable. Sprint with urgency."},
     {title:"Chop Steps",fig:"defense",desc:"In the final 3–4 feet, take rapid SHORT chop steps to decelerate. Get low. Arms UP — one hand in the shooter's face, other arm low for drives."},
     {title:"Recover Position",fig:"slide_l",desc:"After closing out, immediately assume a defensive stance. Be ready to lateral shuffle if they drive. Do NOT fly by — controlled aggression."},
   ],
   cues:["Sprint hard — then chop steps","Hands UP at closeout","Don't fly by — stay in control","Ready to shuffle immediately after"],
   tip:"Most closeout mistakes happen because players either go too slow (don't challenge the shot) or too fast (fly by and give up a drive). Practice the deceleration as much as the sprint.",rpe:7},

  {id:31,name:"EXPLOSIVE FIRST STEP",type:"basketball",muscle:"lower",
   muscles:["Quads","Glutes","Hip Flexors","Calves"],primary:"Quads",diff:"Intermediate",
   equipment:"Cones",
   benefit:"Getting past your defender in the first two steps is where points are scored — this drill isolates exactly that skill.",
   steps:[
     {title:"Triple Threat Setup",fig:"stand",desc:"Start in triple threat — ball protected, knees bent, weight on balls of feet, head up scanning the defence. Look off the defender before driving."},
     {title:"Jab & Go",fig:"lunge",desc:"Jab step in one direction to freeze the defender. Then take an explosive FIRST STEP past them in the other direction. Drive your knee forward with power."},
     {title:"Two-Step Finish",fig:"jump",desc:"Your second step should put you past the defender's hip. Attack the rim in two steps. Measure your distance covered in the first step — that's your power."},
   ],
   cues:["Jab sells the move — make it believable","First step is EXPLOSIVE — not cautious","Attack past the defender's hip","Head up — don't watch your feet"],
   tip:"Place a cone to simulate a defender. Measure how far your first step goes. A short first step = easy stop for the defender. Train the first step to cover maximum ground.",rpe:7},
