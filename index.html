/* ─── SHARED UI ───────────────────────────────────────── */
const NCLogo=({size=36,color=C.fg})=>(
  <svg width={size} height={size} viewBox="0 0 60 60" fill="none">
    <text x="4" y="48" fontFamily="Playfair Display,serif" fontSize="52" fontWeight="700" fill={color} letterSpacing="-2">N</text>
    <text x="22" y="48" fontFamily="Playfair Display,serif" fontSize="52" fontWeight="700" fill={color} letterSpacing="-2">C</text>
  </svg>
);
const Ring=({value,max,color,size=64,stroke=5})=>{
  const r=(size-stroke)/2,circ=2*Math.PI*r,off=circ-(value/max)*circ;
  return(<svg width={size} height={size}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={C.muted} strokeWidth={stroke}/><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round" transform={`rotate(-90 ${size/2} ${size/2})`}/></svg>);
};
const Bars=({values,color=C.accent,height=40})=>{
  const max=Math.max(...values);
  return(<div style={{display:"flex",alignItems:"flex-end",gap:3,height}}>{values.map((v,i)=><div key={i} style={{flex:1,height:`${(v/max)*100}%`,background:i===values.length-1?color:C.muted,borderRadius:2}}/>)}</div>);
};
const Tag=({children,color=C.accent})=>(<span style={{background:color+"22",color,border:`1px solid ${color}44`,borderRadius:4,padding:"2px 8px",fontSize:10,fontWeight:600,letterSpacing:1,textTransform:"uppercase"}}>{children}</span>);
const Card=({children,style={},onClick})=>(<div onClick={onClick} style={{background:C.card,borderRadius:12,border:`1px solid ${C.border}`,padding:16,cursor:onClick?"pointer":"default",...style}}>{children}</div>);
const Btn=({children,variant="primary",style={},onClick})=>(<button onClick={onClick} style={{background:variant==="primary"?C.accent:variant==="ghost"?"transparent":C.muted,color:variant==="primary"?C.accentFg:C.fg,border:variant==="ghost"?`1px solid ${C.border}`:"none",borderRadius:10,padding:"12px 20px",fontFamily:"Space Grotesk",fontWeight:700,fontSize:13,letterSpacing:1,textTransform:"uppercase",cursor:"pointer",width:"100%",...style}}>{children}</button>);
const Stat=({label,value,unit,color=C.accent,trend})=>(<div style={{background:C.card,borderRadius:12,border:`1px solid ${C.border}`,padding:"14px 12px",flex:1}}><div style={{fontSize:10,color:C.mutedFg,fontWeight:600,letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>{label}</div><div style={{display:"flex",alignItems:"baseline",gap:3}}><span style={{fontSize:24,fontWeight:700,color}}>{value}</span><span style={{fontSize:11,color:C.mutedFg}}>{unit}</span></div>{trend&&<div style={{fontSize:10,color:trend>0?C.green:C.red,marginTop:3}}>{trend>0?"↑":"↓"} {Math.abs(trend)}% this week</div>}</div>);

/* ─── BODY DIAGRAM ───────────────────────────────────── */
const BodyDiagram=({muscles,primary,color})=>{
  const bc=C.border;
  const sh=(s,k,isPri)=>{
    const op=isPri?0.72:0.32;
    if(s.t==="e")return<ellipse key={k} cx={s.cx} cy={s.cy} rx={s.rx} ry={s.ry} fill={color} fillOpacity={op}/>;
    if(s.t==="r")return<rect key={k} x={s.x} y={s.y} width={s.w} height={s.h} rx={s.r||0} fill={color} fillOpacity={op}/>;
    if(s.t==="p")return<path key={k} d={s.d} fill={color} fillOpacity={op}/>;
    return null;
  };
  const BodyView=({zones,label})=>(
    <div style={{textAlign:"center"}}>
      <div style={{fontSize:8,color:C.mutedFg,letterSpacing:1,marginBottom:6,fontWeight:600}}>{label}</div>
      <svg viewBox="0 0 70 155" width="72" height="155">
        {/* skeleton */}
        <circle cx="35" cy="10" r="8" fill="none" stroke={bc} strokeWidth="1.5"/>
        <rect x="31" y="18" width="8" height="4" rx="2" fill="none" stroke={bc} strokeWidth="1.5"/>
        <path d="M16,22 Q35,20 54,22 L50,66 L20,66 Z" fill="none" stroke={bc} strokeWidth="1.5" strokeLinejoin="round"/>
        <rect x="8" y="22" width="10" height="36" rx="5" fill="none" stroke={bc} strokeWidth="1.5"/>
        <rect x="52" y="22" width="10" height="36" rx="5" fill="none" stroke={bc} strokeWidth="1.5"/>
        <rect x="18" y="64" width="34" height="12" rx="6" fill="none" stroke={bc} strokeWidth="1.5"/>
        <rect x="18" y="74" width="15" height="34" rx="7" fill="none" stroke={bc} strokeWidth="1.5"/>
        <rect x="37" y="74" width="15" height="34" rx="7" fill="none" stroke={bc} strokeWidth="1.5"/>
        <rect x="19" y="106" width="13" height="32" rx="6" fill="none" stroke={bc} strokeWidth="1.5"/>
        <rect x="38" y="106" width="13" height="32" rx="6" fill="none" stroke={bc} strokeWidth="1.5"/>
        <ellipse cx="25" cy="141" rx="8" ry="3.5" fill="none" stroke={bc} strokeWidth="1.5"/>
        <ellipse cx="45" cy="141" rx="8" ry="3.5" fill="none" stroke={bc} strokeWidth="1.5"/>
        {/* highlights */}
        {muscles.map(m=>{
          const zone=zones[m];
          if(!zone)return null;
          const isPri=m===primary;
          return zone.map((s,i)=>sh(s,`${m}-${i}`,isPri));
        })}
      </svg>
    </div>
  );
  const hasFront=muscles.some(m=>FRONT_Z[m]);
  const hasBack=muscles.some(m=>BACK_Z[m]);
  return(
    <div style={{background:C.card,borderRadius:12,padding:16}}>
      <div style={{fontSize:10,color:C.mutedFg,letterSpacing:1.5,textTransform:"uppercase",marginBottom:12,fontWeight:600}}>💪 Muscle Activation</div>
      <div style={{display:"flex",justifyContent:"center",gap:28,marginBottom:14}}>
        {(hasFront||!hasBack)&&<BodyView zones={FRONT_Z} label="FRONT"/>}
        {(hasBack||!hasFront)&&<BodyView zones={BACK_Z} label="BACK"/>}
      </div>
      <div style={{display:"flex",gap:5,flexWrap:"wrap",justifyContent:"center"}}>
        {muscles.map(m=>(
          <div key={m} style={{fontSize:10,padding:"3px 9px",borderRadius:20,background:m===primary?color+"33":color+"14",color:m===primary?color:C.mutedFg,fontWeight:m===primary?700:400,border:`1px solid ${m===primary?color+"55":"transparent"}`}}>
            {m===primary?"★ "+m:m}
          </div>
        ))}
      </div>
    </div>
  );
};

/* ─── EXERCISE DETAIL MODAL ─────────────────────────── */
const DIFF_COLOR={"Beginner":C.green,"Intermediate":C.orange,"Advanced":C.red};

const ExerciseModal=({ex,onClose})=>{
  const mex=mergeEx(ex);
  const tc=TYPES[mex.type]?.color||C.accent;
  const exImg=getImgData(mex.id);
  ex=mex;
  return(
    <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.88)",zIndex:200,display:"flex",flexDirection:"column",backdropFilter:"blur(6px)"}} onClick={onClose}>
      <div className="fade-up" onClick={e=>e.stopPropagation()} style={{background:C.bg,borderRadius:"24px 24px 0 0",marginTop:"auto",maxHeight:"92%",overflowY:"auto",border:`1px solid ${C.border}`}}>

        {/* Header — always shown */}
        <div style={{padding:"20px 20px 0",position:"sticky",top:0,background:C.bg,zIndex:10,paddingBottom:12,borderBottom:`1px solid ${C.border}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:6}}>
                <Tag color={tc}>{TYPES[ex.type]?.label}</Tag>
                <Tag color={DIFF_COLOR[ex.diff]}>{ex.diff}</Tag>
                <Tag color={C.mutedFg}>{ex.equipment}</Tag>
              </div>
              <div style={{fontSize:18,fontWeight:700,color:C.fg,letterSpacing:0.5}}>{ex.name}</div>
            </div>
            <button onClick={onClose} style={{background:C.muted,border:"none",color:C.fg,width:32,height:32,borderRadius:16,cursor:"pointer",fontSize:14,flexShrink:0,marginLeft:8}}>✕</button>
          </div>
        </div>

        <div style={{padding:"16px 20px 36px",display:"flex",flexDirection:"column",gap:18}}>

          {/* Why this exercise */}
          <div style={{background:`${tc}11`,border:`1px solid ${tc}33`,borderRadius:12,padding:14}}>
            <div style={{fontSize:10,color:tc,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",marginBottom:6}}>🏀 Why This Matters</div>
            <div style={{fontSize:13,color:C.fg,lineHeight:1.7}}>{ex.benefit}</div>
          </div>

          {/* Step-by-step */}

                  {m===ex.primary?`★ ${m}`:m}

            <div style={{fontSize:11,color:C.mutedFg,letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>Target Effort — RPE {ex.rpe}/10</div>

              {Array.from({length:10},(_,j)=><div key={j} style={{flex:1,height:8,borderRadius:2,background:j<ex.rpe?(j<5?C.green:j<8?C.orange:C.red):C.muted}}/>)}

/* ─── EXERCISE LIBRARY SCREEN ─────────────────────────── */
const LibraryScreen=({onBack})=>{
  const [typeFilter,setTypeFilter]=useState("all");
  const [muscleFilter,setMuscleFilter]=useState("all");
  const [selectedEx,setSelectedEx]=useState(null);
  const [search,setSearch]=useState("");

  const filtered=EXERCISES.filter(ex=>{
    if(typeFilter!=="all"&&ex.type!==typeFilter)return false;
    if(muscleFilter!=="all"&&ex.muscle!==muscleFilter)return false;
    if(search&&!ex.name.toLowerCase().includes(search.toLowerCase()))return false;
    return true;
  });

  const typeKeys=["all",...Object.keys(TYPES)];

  return(
    <div style={{padding:"0 16px 16px",position:"relative"}}>
      {selectedEx&&<ExerciseModal ex={selectedEx} onClose={()=>setSelectedEx(null)}/>}

      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
        <button onClick={onBack} style={{background:C.muted,border:`1px solid ${C.border}`,color:C.fg,width:36,height:36,borderRadius:10,cursor:"pointer",fontSize:16,flexShrink:0}}>←</button>
        <div>
          <div style={{fontSize:12,color:C.mutedFg,letterSpacing:2,textTransform:"uppercase"}}>Browse All</div>
          <div style={{fontSize:20,fontWeight:700,color:C.fg}}>EXERCISE LIBRARY</div>
        </div>
      </div>

      {/* Search */}
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search exercises..."
        style={{width:"100%",background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 14px",color:C.fg,fontFamily:"Space Grotesk",fontSize:13,outline:"none",marginBottom:12}}/>

      {/* Type filter */}
      <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4,marginBottom:10}}>
        {typeKeys.map(k=>{
          const tc=k==="all"?C.mutedFg:TYPES[k]?.color;
          return(
            <button key={k} onClick={()=>setTypeFilter(k)} style={{background:typeFilter===k?(k==="all"?C.muted:tc+"22"):C.card,color:typeFilter===k?(k==="all"?C.fg:tc):C.mutedFg,border:`1px solid ${typeFilter===k?(k==="all"?C.border:tc):C.border}`,borderRadius:20,padding:"6px 12px",fontFamily:"Space Grotesk",fontWeight:600,fontSize:10,letterSpacing:1,cursor:"pointer",flexShrink:0,textTransform:"uppercase"}}>
              {k==="all"?"ALL":TYPES[k]?.label}
            </button>
          );
        })}
      </div>

      {/* Muscle filter */}
      <div style={{display:"flex",gap:6,marginBottom:16}}>
        {["all",...Object.keys(MUSCLES)].map(k=>(
          <button key={k} onClick={()=>setMuscleFilter(k)} style={{flex:1,padding:"7px 4px",background:muscleFilter===k?C.muted:C.card,color:muscleFilter===k?C.fg:C.mutedFg,border:`1px solid ${muscleFilter===k?C.fg+"22":C.border}`,borderRadius:8,fontFamily:"Space Grotesk",fontWeight:600,fontSize:9,letterSpacing:0.5,cursor:"pointer",textTransform:"uppercase"}}>
            {k==="all"?"ALL":MUSCLES[k].label}
          </button>
        ))}
      </div>

      {/* Count */}
      <div style={{fontSize:11,color:C.mutedFg,marginBottom:12}}>{filtered.length} exercise{filtered.length!==1?"s":""} found</div>

      {/* Exercise list */}
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {filtered.map(ex=>{
          const tc=TYPES[ex.type]?.color||C.accent;
          const cardImg=getImgData(ex.id);
          return(
            <Card key={ex.id} onClick={()=>setSelectedEx(ex)} style={{display:"flex",gap:14,alignItems:"center"}}>
              {/* Thumbnail — photo if set in EX_IMAGES, else SVG figure */}
              <div style={{width:54,height:54,borderRadius:10,background:cardImg?"#fff":`${tc}11`,border:`1px solid ${tc}22`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,overflow:"hidden"}}>
                {cardImg
                  ?<img src={cardImg} alt={ex.name} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                  :<svg viewBox="0 0 100 88" style={{width:44,height:44}}>
                    {FIG[ex.steps[1]?.fig||(ex.steps[0]?.fig)]?.(C.fg,tc)}
                  </svg>
                }
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:700,color:C.fg,letterSpacing:0.5,marginBottom:4}}>{ex.name}</div>
                <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                  <Tag color={tc}>{TYPES[ex.type]?.label.split(" ")[1]||TYPES[ex.type]?.label.split(" ")[0]}</Tag>
                  <Tag color={DIFF_COLOR[ex.diff]}>{ex.diff}</Tag>
                </div>
              </div>
              <div style={{color:C.mutedFg,fontSize:16,flexShrink:0}}>›</div>

        })}
        {filtered.length===0&&(
          <div style={{textAlign:"center",padding:"40px 0"}}>
            <div style={{fontSize:32,marginBottom:8}}>🔍</div>
            <div style={{fontSize:14,fontWeight:700,color:C.fg,marginBottom:4}}>No exercises found</div>
            <div style={{fontSize:12,color:C.mutedFg}}>Try adjusting your filters</div>
          </div>
        )}
      </div>
    </div>
  );
};

/* ─── TODAY'S WORKOUT (TRAIN SCREEN) ─────────────────── */
const TODAY_IDS=[4,5,11,6,9]; // Back Squat, RDL, Box Jump, Split Squat, Calf Raise

const WorkoutsScreen=()=>{
  const [showLibrary,setShowLibrary]=useState(false);
  const [logged,setLogged]=useState({});
  const [selectedEx,setSelectedEx]=useState(null);

  if(showLibrary)return<LibraryScreen onBack={()=>setShowLibrary(false)}/>;

  const todayExercises=EXERCISES.filter(e=>TODAY_IDS.includes(e.id));
  const toggle=(ei,si)=>{const k=`${ei}-${si}`;setLogged(p=>({...p,[k]:!p[k]}));};
  const done=todayExercises.filter(ex=>Array.from({length:ex.rpe>=7?4:3},(_,s)=>logged[`${ex.id}-${s}`]).every(Boolean)).length;

  return(
    <div style={{padding:"0 16px 16px",position:"relative"}}>
      {selectedEx&&<ExerciseModal ex={selectedEx} onClose={()=>setSelectedEx(null)}/>}

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div>
          <div style={{fontSize:12,color:C.mutedFg,letterSpacing:2,textTransform:"uppercase"}}>Today</div>
          <div style={{fontSize:20,fontWeight:700,color:C.fg}}>LOWER BODY POWER</div>
        </div>

          <button key={i} style={{background:i===0?C.accent:C.card,color:i===0?C.accentFg:C.mutedFg,border:`1px solid ${i===0?C.accent:C.border}`,borderRadius:8,padding:"7px 12px",fontFamily:"Space Grotesk",fontWeight:700,fontSize:10,letterSpacing:1,cursor:"pointer",flexShrink:0}}>{d}</button>
        ))}
      </div>

      {/* Progress */}
      <Card style={{marginBottom:16,display:"flex",alignItems:"center",gap:16}}>
        <Ring value={done} max={todayExercises.length} color={C.accent} size={60}/>
        <div style={{flex:1}}>
          <div style={{fontSize:17,fontWeight:700,color:C.fg}}>{done}/{todayExercises.length} Exercises</div>
          <div style={{fontSize:11,color:C.mutedFg,marginTop:2}}>{done===todayExercises.length?"🎉 Session Complete!":"Tap exercise name for instructions"}</div>

      </Card>

      {/* Exercises */}
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {todayExercises.map((ex)=>{
          const sets=ex.rpe>=7?4:3;
          const allDone=Array.from({length:sets},(_,s)=>logged[`${ex.id}-${s}`]).every(Boolean);
          const tc=TYPES[ex.type]?.color||C.accent;
          return(
            <Card key={ex.id} style={{opacity:allDone?0.6:1}}>
              <div style={{display:"flex",gap:10,marginBottom:12}}>
                {/* Mini SVG */}
                <div style={{width:48,height:48,borderRadius:10,background:`${tc}11`,border:`1px solid ${tc}22`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,cursor:"pointer"}} onClick={()=>setSelectedEx(ex)}>
                  <svg viewBox="0 0 100 88" style={{width:38,height:38}}>
                    {FIG[ex.steps[0].fig]?.(C.fg,tc)}
                  </svg>
                </div>
                <div style={{flex:1,cursor:"pointer"}} onClick={()=>setSelectedEx(ex)}>
                  <div style={{fontSize:13,fontWeight:700,color:allDone?C.green:C.fg,letterSpacing:0.3,marginBottom:4}}>{ex.name}</div>
                  <div style={{display:"flex",gap:4}}>
                    <Tag color={DIFF_COLOR[ex.diff]}>{ex.diff}</Tag>
                    <Tag color={tc}>{sets} sets × {ex.steps[0].fig.includes("hinge")||ex.name.includes("RDL")?"8":ex.name.includes("CALF")?"15":"6"} reps</Tag>
                  </div>
                </div>
                <div style={{fontSize:10,color:C.accent,fontWeight:700,cursor:"pointer",paddingTop:4}} onClick={()=>setSelectedEx(ex)}>INFO ›</div>
              </div>
              {/* Set buttons */}
              <div style={{display:"flex",gap:6}}>
                {Array.from({length:sets},(_,s)=>{
                  const d=logged[`${ex.id}-${s}`];
                  return<button key={s} onClick={()=>toggle(ex.id,s)} style={{flex:1,height:34,borderRadius:8,background:d?tc:C.muted,color:d?( tc===C.accent?C.accentFg:C.fg):C.mutedFg,border:`1px solid ${d?tc:C.border}`,fontFamily:"Space Grotesk",fontWeight:700,fontSize:11,cursor:"pointer"}}>{d?"✓":`S${s+1}`}</button>;
                })}
              </div>
              {/* RPE strip */}
              <div style={{display:"flex",alignItems:"center",gap:6,marginTop:8}}>
                <div style={{fontSize:9,color:C.mutedFg}}>EFFORT</div>
                <div style={{display:"flex",gap:2,flex:1}}>
                  {Array.from({length:10},(_,j)=><div key={j} style={{flex:1,height:3,borderRadius:1,background:j<ex.rpe?(j<5?C.green:j<8?C.orange:C.red):C.muted}}/>)}

                <div style={{fontSize:9,color:C.mutedFg}}>{ex.rpe}/10</div>

      <button onClick={()=>setShowLibrary(true)} style={{width:"100%",marginTop:16,background:"transparent",border:`1px solid ${C.border}`,borderRadius:12,padding:14,color:C.fg,fontFamily:"Space Grotesk",fontWeight:700,fontSize:13,letterSpacing:1,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,textTransform:"uppercase"}}>
        <span>📚</span> BROWSE EXERCISE LIBRARY
      </button>
    </div>
  );
};

/* ─── RECOVERY ────────────────────────────────────────── */
const RecoveryScreen=()=>{
  const [scores,setScores]=useState({sleep:7,soreness:3,energy:6,stress:4});
  const [saved,setSaved]=useState(false);
  const metrics=[
    {key:"sleep",label:"SLEEP QUALITY",emoji:"😴",color:"#818CF8",tip:"7–9 hours is the recovery sweet spot."},
    {key:"energy",label:"ENERGY LEVEL",emoji:"⚡",color:C.accent,tip:"Low energy two days running? Consider a deload."},
    {key:"soreness",label:"MUSCLE SORENESS",emoji:"💪",color:C.orange,tip:"Some soreness is normal. Severe needs rest."},
    {key:"stress",label:"STRESS LEVEL",emoji:"🧠",color:C.red,tip:"Mental stress slows physical recovery too."},
  ];
  const score=Math.round((scores.sleep/10)*30+(scores.energy/10)*30+((10-scores.soreness)/10)*20+((10-scores.stress)/10)*20);
  const [label,rc]=score>=80?["ELITE",C.green]:score>=60?["READY",C.accent]:score>=40?["MODERATE",C.orange]:["REST DAY",C.red];
  return(
    <div style={{padding:"0 16px 16px"}}>
      <div style={{marginBottom:20}}><div style={{fontSize:12,color:C.mutedFg,letterSpacing:2,textTransform:"uppercase"}}>Daily Check-In</div><div style={{fontSize:20,fontWeight:700,color:C.fg}}>RECOVERY STATUS</div></div>
      <Card style={{marginBottom:16,textAlign:"center",padding:24}}>
        <div style={{position:"relative",display:"inline-block",marginBottom:12}}>
          <Ring value={score} max={100} color={rc} size={100} stroke={7}/>
          <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)"}}><div style={{fontSize:26,fontWeight:700,color:rc}}>{score}</div></div>
        </div>
        <div style={{fontSize:18,fontWeight:700,color:rc,letterSpacing:2}}>{label}</div>
        <div style={{fontSize:11,color:C.mutedFg,marginTop:4}}>{label==="ELITE"?"Push hard today 🔥":label==="READY"?"Good to train":label==="MODERATE"?"Light session recommended":"Prioritise rest & nutrition"}</div>
      </Card>
      {!saved?(<><div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:16}}>{metrics.map(({key,label,emoji,color,tip})=>(<Card key={key}><div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><div style={{fontSize:12,fontWeight:600,color:C.fg}}>{emoji} {label}</div><div style={{fontSize:16,fontWeight:700,color}}>{scores[key]}/10</div></div><input type="range" min={1} max={10} value={scores[key]} onChange={e=>setScores(s=>({...s,[key]:+e.target.value}))} style={{width:"100%",accentColor:color,cursor:"pointer"}}/><div style={{fontSize:10,color:C.mutedFg,marginTop:6}}>💬 {tip}</div></Card>))}</div><Btn onClick={()=>setSaved(true)}>LOG RECOVERY</Btn></>):(<Card style={{textAlign:"center",padding:20}}><div style={{fontSize:24,marginBottom:8}}>✅</div><div style={{fontWeight:700,color:C.fg,marginBottom:4}}>Recovery Logged</div><Btn variant="ghost" onClick={()=>setSaved(false)} style={{marginTop:12}}>Edit Entry</Btn></Card>)}
    </div>
  );
};

/* ── Admin Exercise Editor ───────────────────────────── */
const AdminEditModal=({ex,onClose})=>{
  const ov=(getAdminData().exercises||{})[ex.id]||{};
  const savedImg=(getAdminData().images||{})[ex.id]||EX_IMAGES[ex.id]||"";
  const [form,setForm]=React.useState({
    name:ov.name||ex.name,
    benefit:ov.benefit||ex.benefit,
    steps:(ov.steps||ex.steps).map(s=>({...s})),
    cues:[...(ov.cues||ex.cues)],
    tip:ov.tip||ex.tip,
    rpe:ov.rpe||ex.rpe,
  });
  const [img,setImg]=React.useState(savedImg);
  const [imgName,setImgName]=React.useState("");
  const fileRef=useRef();
  const tc=TYPES[ex.type]?.color||C.accent;
  const iStyle={width:"100%",background:C.muted,border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 12px",color:C.fg,fontFamily:"Space Grotesk",fontSize:12,outline:"none",resize:"vertical",boxSizing:"border-box"};
  const lStyle={fontSize:10,color:C.mutedFg,letterSpacing:1.5,textTransform:"uppercase",fontWeight:700,marginBottom:6,marginTop:16,display:"block"};

  const handleImg=e=>{
    const file=e.target.files?.[0];if(!file)return;
    setImgName(file.name);
    const r=new FileReader();r.onload=ev=>setImg(ev.target.result);r.readAsDataURL(file);
  };
  const save=()=>{
    const d=getAdminData();
    d.exercises=d.exercises||{};d.images=d.images||{};
    d.exercises[ex.id]={name:form.name,benefit:form.benefit,steps:form.steps,cues:form.cues,tip:form.tip,rpe:form.rpe};
    if(img)d.images[ex.id]=img; else delete d.images[ex.id];
    saveAdminData(d);window.location.reload();
  };
  const reset=()=>{
    if(!confirm("Reset this exercise to defaults?"))return;
    const d=getAdminData();
    if(d.exercises)delete d.exercises[ex.id];
    if(d.images)delete d.images[ex.id];
    saveAdminData(d);window.location.reload();
  };
  const upd=(k,v)=>setForm(f=>({...f,[k]:v}));
  const updStep=(i,k,v)=>setForm(f=>{const s=[...f.steps];s[i]={...s[i],[k]:v};return{...f,steps:s};});
  const updCue=(i,v)=>setForm(f=>{const c=[...f.cues];c[i]=v;return{...f,cues:c};});

  return(
    <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.94)",zIndex:300,display:"flex",flexDirection:"column",overflowY:"auto"}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:C.bg,borderRadius:"24px 24px 0 0",marginTop:40,flex:1,overflowY:"auto",border:`1px solid ${C.border}`}}>
        {/* Header */}
        <div style={{padding:"16px 20px",position:"sticky",top:0,background:C.bg,zIndex:10,borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{fontSize:10,color:tc,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase"}}>EDITING</div><div style={{fontSize:16,fontWeight:700,color:C.fg}}>{ex.name}</div></div>
          <button onClick={onClose} style={{background:C.muted,border:"none",color:C.fg,width:32,height:32,borderRadius:16,cursor:"pointer",fontSize:14}}>✕</button>
        </div>
        <div style={{padding:"4px 20px 36px"}}>

          {/* Image */}
          <label style={lStyle}>Exercise Image</label>
          <div onClick={()=>fileRef.current?.click()} style={{background:img?"#fff":C.card,border:`2px dashed ${img?tc:C.border}`,borderRadius:12,overflow:"hidden",cursor:"pointer",minHeight:80,display:"flex",alignItems:"center",justifyContent:"center"}}>
            {img?<img src={img} alt="preview" style={{width:"100%",maxHeight:180,objectFit:"contain",display:"block"}}/>
              :<div style={{textAlign:"center",padding:20}}><div style={{fontSize:30,marginBottom:4}}>📸</div><div style={{fontSize:12,color:C.fg,fontWeight:600}}>Tap to upload image</div><div style={{fontSize:10,color:C.mutedFg,marginTop:2}}>JPG · PNG · WebP</div></div>}
          </div>
          <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleImg}/>
          {imgName&&<div style={{fontSize:10,color:C.green,marginTop:4}}>✓ {imgName} ready to save</div>}
          {img&&<button onClick={e=>{e.stopPropagation();setImg("");setImgName("");}} style={{background:"none",border:"none",color:C.red,fontSize:10,cursor:"pointer",padding:"4px 0",display:"block"}}>✕ Remove image</button>}

          {/* Name */}
          <label style={lStyle}>Exercise Name</label>
          <input value={form.name} onChange={e=>upd("name",e.target.value)} style={{...iStyle,resize:"none"}}/>

          {/* Benefit */}
          <label style={lStyle}>Why This Matters</label>
          <textarea rows={3} value={form.benefit} onChange={e=>upd("benefit",e.target.value)} style={iStyle}/>

          {/* Steps */}
          <label style={lStyle}>Steps</label>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {form.steps.map((s,i)=>(
              <div key={i} style={{background:C.card,borderRadius:10,padding:"12px",border:`1px solid ${C.border}`}}>
                <div style={{fontSize:10,color:tc,fontWeight:700,marginBottom:8}}>STEP {i+1}</div>
                <input value={s.title} onChange={e=>updStep(i,"title",e.target.value)} placeholder="Title" style={{...iStyle,marginBottom:8,resize:"none"}}/>
                <textarea rows={3} value={s.desc} onChange={e=>updStep(i,"desc",e.target.value)} placeholder="Description" style={iStyle}/>
              </div>
            ))}
          </div>

          {/* Cues */}
          <label style={lStyle}>Coaching Cues</label>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {form.cues.map((c,i)=>(
              <input key={i} value={c} onChange={e=>updCue(i,e.target.value)} style={{...iStyle,resize:"none"}} placeholder={`Cue ${i+1}`}/>
            ))}
          </div>

          {/* Tip */}
          <label style={lStyle}>Beginner Tip / Safety Note</label>
          <textarea rows={4} value={form.tip} onChange={e=>upd("tip",e.target.value)} style={iStyle}/>

          {/* RPE */}
          <label style={lStyle}>Target Effort — RPE {form.rpe}/10</label>
          <input type="range" min={1} max={10} value={form.rpe} onChange={e=>upd("rpe",+e.target.value)} style={{width:"100%",accentColor:tc,cursor:"pointer",marginBottom:4}}/>
          <div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:9,color:C.mutedFg}}>Easy</span><span style={{fontSize:9,color:C.mutedFg}}>Max Effort</span></div>

          {/* Buttons */}
          <button onClick={save} style={{marginTop:24,width:"100%",background:C.accent,color:C.accentFg,border:"none",borderRadius:12,padding:"14px",fontFamily:"Space Grotesk",fontWeight:700,fontSize:13,letterSpacing:1,cursor:"pointer",textTransform:"uppercase"}}>💾 SAVE CHANGES</button>
          <button onClick={reset} style={{marginTop:10,width:"100%",background:"none",color:C.red,border:`1px solid ${C.red}44`,borderRadius:12,padding:"11px",fontFamily:"Space Grotesk",fontWeight:600,fontSize:11,cursor:"pointer"}}>Reset to defaults</button>
        </div>
      </div>
    </div>
  );
};

          style={{width:"100%",background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 14px",color:C.fg,fontFamily:"Space Grotesk",fontSize:13,outline:"none",boxSizing:"border-box"}}/>
      </div>
      {/* Stats */}
      <div style={{padding:"10px 16px",display:"flex",gap:8,flexShrink:0,borderBottom:`1px solid ${C.border}`}}>
        <div style={{background:C.card,borderRadius:8,padding:"5px 10px",fontSize:9,color:C.mutedFg,border:`1px solid ${C.border}`,fontWeight:600}}>{EXERCISES.length} EXERCISES</div>
        <div style={{background:C.green+"11",borderRadius:8,padding:"5px 10px",fontSize:9,color:C.green,border:`1px solid ${C.green}33`,fontWeight:600}}>{imgCount} WITH IMAGES</div>
        <div style={{background:C.accent+"11",borderRadius:8,padding:"5px 10px",fontSize:9,color:C.accent,border:`1px solid ${C.accent}33`,fontWeight:600}}>{editCount} EDITED</div>
      </div>
      {/* List */}
      <div style={{flex:1,overflowY:"auto",padding:"0 16px 24px"}}>
        {Object.entries(grouped).map(([type,exs])=>(
          <div key={type}>
            <div style={{fontSize:10,color:C.mutedFg,letterSpacing:2,textTransform:"uppercase",marginTop:18,marginBottom:8,fontWeight:700}}>{TYPES[type]?.label}</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {exs.map(ex=>{
                const hasEdit=!!(adminData.exercises||{})[ex.id];
                const hasImg=!!(adminData.images||{})[ex.id]||!!EX_IMAGES[ex.id];
                const tc=TYPES[ex.type]?.color||C.accent;
                return(
                  <button key={ex.id} onClick={()=>setEditEx(mergeEx(ex))}
                    style={{background:C.card,border:`1px solid ${hasEdit?tc+"55":C.border}`,borderRadius:12,padding:"12px 14px",display:"flex",alignItems:"center",gap:12,cursor:"pointer",width:"100%",textAlign:"left",boxSizing:"border-box"}}>
                    <div style={{width:38,height:38,borderRadius:10,background:`${tc}18`,border:`1px solid ${tc}33`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:16}}>
                      {hasImg?"📸":"🖼️"}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:700,color:C.fg,marginBottom:3}}>{ex.name}</div>
                      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                        <span style={{fontSize:9,color:tc,fontWeight:600,textTransform:"uppercase"}}>{ex.diff}</span>
                        {hasEdit&&<span style={{fontSize:9,color:C.accent,fontWeight:700}}>✏️ EDITED</span>}
                        {hasImg&&<span style={{fontSize:9,color:C.green,fontWeight:700}}>📸 IMAGE</span>}
                      </div>
                    </div>
                    <span style={{color:C.mutedFg,fontSize:18,flexShrink:0}}>›</span>
                  </button>
                );
              })}
            </div>
          </div>
        ))}
        <button onClick={clearAll} style={{marginTop:28,width:"100%",background:"none",color:C.red,border:`1px solid ${C.red}44`,borderRadius:12,padding:"12px",fontFamily:"Space Grotesk",fontWeight:600,fontSize:11,cursor:"pointer",boxSizing:"border-box"}}>⚠️ Reset All to Defaults</button>
      </div>
    </div>
  );
};

/* ─── APP SHELL ───────────────────────────────────────── */
const NAV=[
  {id:"home",label:"HOME",icon:"⊞"},{id:"workouts",label:"TRAIN",icon:"🏋️"},
  {id:"recovery",label:"RECOVER",icon:"💚"},{id:"metrics",label:"BODY",icon:"📊"},
  {id:"videos",label:"VIDEOS",icon:"🎬"},{id:"stats",label:"STATS",icon:"🏆"},
];
function App(){
  const [tab,setTab]=useState("home");
  const [showAdminLogin,setShowAdminLogin]=useState(false);
  const [showAdmin,setShowAdmin]=useState(false);
  const screens={home:<HomeScreen setTab={setTab}/>,workouts:<WorkoutsScreen/>,recovery:<RecoveryScreen/>,metrics:<MetricsScreen/>,videos:<VideosScreen/>,stats:<StatsScreen/>};
  return(
    <div style={{display:"flex",justifyContent:"center",alignItems:"center",minHeight:"100vh",background:"#000",fontFamily:"Space Grotesk,sans-serif"}}>
      <div style={{width:390,height:844,background:C.bg,borderRadius:44,overflow:"hidden",boxShadow:"0 0 0 10px #111,0 0 80px rgba(223,225,4,0.15)",display:"flex",flexDirection:"column",position:"relative"}}>
        {/* Admin overlays */}
        {showAdminLogin&&<AdminLogin onSuccess={()=>{setShowAdminLogin(false);setShowAdmin(true);}} onClose={()=>setShowAdminLogin(false)}/>}
        {showAdmin&&<AdminPanel onClose={()=>setShowAdmin(false)}/>}

        {/* Status bar */}
        <div style={{background:C.bg,padding:"14px 24px 0",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
          <span style={{fontSize:12,fontWeight:600,color:C.fg}}>9:41</span>
          <div style={{display:"flex",gap:6,alignItems:"center"}}><NCLogo size={22}/><span style={{fontSize:11,fontWeight:700,color:C.fg,letterSpacing:2,textTransform:"uppercase"}}>NETS COACHING</span></div>
          {/* Admin gear — tap to enter admin mode */}
          <button onClick={()=>setShowAdminLogin(true)} style={{background:"none",border:"none",color:C.mutedFg,fontSize:14,cursor:"pointer",padding:"2px 4px",lineHeight:1}} title="Admin">⚙</button>
        </div>

        <div style={{flex:1,overflowY:"auto",paddingTop:16}}>{screens[tab]}</div>
        <div style={{background:C.surface,borderTop:`1px solid ${C.border}`,display:"flex",padding:"8px 2px 18px",flexShrink:0}}>
          {NAV.map(n=>(<button key={n.id} onClick={()=>setTab(n.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:"none",border:"none",cursor:"pointer",padding:"4px 0"}}>
            <div style={{width:30,height:30,borderRadius:9,background:tab===n.id?C.accent:"transparent",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s"}}>
              {tab===n.id?<span style={{fontWeight:700,fontSize:9,color:C.accentFg,letterSpacing:-0.5}}>{n.label.slice(0,3)}</span>:<span style={{fontSize:16}}>{n.icon}</span>}
            </div>
            <span style={{fontSize:7,color:tab===n.id?C.accent:C.mutedFg,fontWeight:tab===n.id?700:400,letterSpacing:0.3}}>{n.label}</span>
          </button>))}
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
